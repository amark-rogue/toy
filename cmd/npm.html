<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div class="box">
  <div class="bar">
    <span class="tag">npm</span>
    <span id="sub" class="val"></span>
  </div>
  <pre id="out" class="out"></pre>
  <div class="acts">
    <button onclick="kit.say('npm install','prompt')">install</button>
    <button onclick="kit.say('npm start','prompt')">start</button>
    <button onclick="kit.say('npm test','prompt')">test</button>
    <button onclick="kit.say('npm run build','prompt')">build</button>
  </div>
</div>
<style>
body { display: block; }
.acts { display: flex; flex-wrap: wrap; gap: 0.4em; padding: 0.5em 0.8em; border-top: 1px solid var(--pop); flex-shrink: 0; }
.acts button { flex: 1 1 40%; min-width: 0; font-family: 'Courier New', monospace; font-weight: bold; border: 1px solid var(--pop); padding: 0.4em; border-radius: 8px; background: transparent; cursor: pointer; }
.acts button:active { background: var(--pop); color: var(--mood); }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('npm', function hear(eve) {
  var raw = (eve.detail || eve.data || '').flat().trim();
  // For each \n-line, simulate \r overwrites and strip non-ASCII (garbled spinners)
  var s = raw.split('\n').map(function(l) {
    var parts = l.split('\r');
    for(var i = parts.length - 1; i >= 0; i--) {
      var clean = parts[i].replace(/[^\x09\x20-\x7E]/g, '').trim();
      if(clean) return clean;
    }
    return '';
  });
  B.all('#sub')[0].textContent = s[0].replace(/^npm\s+/,'').split(/\s+/)[0] || '?';
  var el = B.all('#out')[0];
  el.textContent = s.slice(1).filter(function(l){ return l.trim(); }).join('\n');
  hear.off();
});
</script>
