<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.0/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/a11y-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/amark/monotype/monotype.js" integrity="sha384-3c6Vpd2P7HeANlkSl3fzNZzvzICdxV7UypVSY4oqoH927hRmgK7+7mDFLoQtw4Dc" crossorigin="anonymous"></script>

<style>
:root { --yes: #34c759; --hot: #ff3b30; }
body, html { margin: 0; padding: 0; min-height: 0; background: var(--mood, #000); color: var(--pop, #fff); font-family: 'Courier New', monospace; overflow: hidden; }

.git-ui { width: 100%; display: flex; flex-direction: column; }
.file-row { display: flex; align-items: center; padding: 1em; border-bottom: 1px solid color-mix(in srgb, var(--pop) 15%, transparent); }
.stage-toggle { width: 2em; height: 2em; border-radius: 50%; border: 2px solid var(--yes); display: grid; place-items: center; margin-right: 1em; cursor: pointer; flex-shrink: 0; }
.stage-toggle.checked { background: var(--yes); }
.file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 1.2em; font-weight: bold; cursor: pointer; }
.file-name.status-A { color: var(--yes); }
.file-name.status-M { color: var(--pop); }
.file-name.status-D { color: var(--hot); }
.file-name.status-Q { color: var(--err, #ff0055); }
.twirl { cursor: pointer; padding: 1em; color: var(--pop); font-size: 1.5em; user-select: none; }
.twirl.open { transform: rotate(90deg); }

.editor-wrapper { display: none; width: 100%; padding: 0; box-sizing: border-box; }
.editor-wrapper.active { display: block; }

pre, code {
  margin: 0; padding: 0;
  font-family: 'Courier New', monospace;
  font-size: 18px; 
  letter-spacing: 0.05em;
  line-height: 2.2em; 
  word-wrap: break-word;
  white-space: pre-wrap;
  outline: none;
  display: block;
  width: 100%;
}

code { counter-reset: line; padding-bottom: 1em; }

.line { display: block; counter-increment: line; position: relative; }
.line::before {
  content: counter(line);
  display: inline-block;
  width: 2.5em;
  text-align: right;
  margin-right: 1em;
  font-size: 0.5em; 
  color: color-mix(in srgb, var(--pop) 35%, transparent);
  user-select: none;
  vertical-align: middle;
}

.prefix { display: inline-block; width: 1em; user-select: none; color: #555; font-weight: bold; }
.line.add { background: rgba(52, 199, 89, 0.15); }
.line.add .prefix { color: var(--yes); }
.line.del { background: rgba(255, 59, 48, 0.15); }
.line.del .prefix { color: var(--hot); }
.line.header { color: color-mix(in srgb, var(--pop) 50%, transparent); background: color-mix(in srgb, var(--pop) 5%, transparent); }
.line.chunk { color: var(--pop); background: color-mix(in srgb, var(--pop) 5%, transparent); font-weight: bold; }

.char-add { background: rgba(52, 199, 89, 0.4); text-shadow: 0 0 5px #000; }
.char-del { background: rgba(255, 59, 48, 0.4); text-decoration: line-through; text-shadow: 0 0 5px #000; }
.git-raw { padding: 1em; margin: 0; white-space: pre-wrap; word-break: break-all; }
.git-note { padding: 2em; text-align: center; opacity: 0.5; }

/* New UI styles */
.ls {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4em;
  padding: 10px;
  align-content: flex-start;
}
.ls a {
  display: block;
  flex: 0 0 auto;
  min-width: 4em;
  max-width: 10em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0.7em 0.6em;
  text-align: center;
  background: color-mix(in srgb, var(--pop) 8%, transparent);
  border: 1px solid var(--pop);
  border-radius: 0.6em;
  font-family: 'Courier New', monospace;
  font-weight: 900;
  cursor: pointer;
  user-select: none;
}
.ls a:active {
  background: var(--pop);
  color: var(--mood);
  transform: scale(0.92);
}

.config-ui { padding: 1em; color: var(--pop); }
.config-list { margin-bottom: 2em; }
.config-row { display: flex; align-items: center; margin-bottom: 0.5em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5em; }
.config-key { flex: 0 0 12em; font-family: monospace; font-size: 0.9em; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; padding-right: 1em; }
.config-val { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--pop); font-family: inherit; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
.config-val:focus { border-color: var(--pop); outline: none; background: rgba(255,255,255,0.05); }
.config-add { border-top: 1px dashed var(--pop); padding-top: 1em; display: flex; flex-direction: column; gap: 0.5em; }
.config-add h3 { margin: 0 0 0.5em 0; font-size: 1.1em; }
.config-add-row { display: flex; gap: 0.5em; }
.btn-add { background: var(--yes); color: var(--mood); border: none; border-radius: 4px; padding: 4px 12px; font-weight: bold; cursor: pointer; }
</style>

<div id="app" class="git-ui"></div>

<script>
var app = document.getElementById('app');

function gitFlat(s) {
    s = (s||"").flat();
    var arr = s.split('\n'), i=0, l, p, r, j;
    for(; i<arr.length; i++){
        if((l = arr[i]).indexOf('\r') === -1) continue;
        p = l.split('\r'); r = p[0];
        for(j=1; j<p.length; j++){
            r = p[j] + r.slice(p[j].length);
        }
        arr[i] = r;
    }
    return arr.join('\n');
}

function wipe(node) {
    node.replaceChildren();
}

function fill(node, html) {
    var ran = document.createRange();
    ran.selectNodeContents(node);
    wipe(node);
    node.appendChild(ran.createContextualFragment(html));
}

function make(tag, cls, txt) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    if (txt !== undefined) node.textContent = txt;
    return node;
}

function makeRow(f, open) {
    var row = make('div', 'file-row');
    var tog;
    row.setAttribute('data-path', f.path || f);
    if (f.kind) {
        tog = make('div', 'stage-toggle' + (f.staged ? ' checked' : ''));
        row.appendChild(tog);
        row.appendChild(make('div', 'file-name status-' + f.kind, f.display));
    } else {
        row.appendChild(make('div', 'file-name status-M', f));
    }
    row.appendChild(make('div', open ? 'twirl open' : 'twirl', '▶'));
    return row;
}

function renderNoRepo(raw) {
    wipe(app);
    var div = make('div', 'ls');
    
    var btns = [
        { label: 'clone', cmd: 'git clone https://github.com/', type: 'try' },
        { label: 'init', cmd: 'git init', type: 'prompt' },
        { label: 'config', cmd: 'git config --list', type: 'prompt' },
        { label: 'help', cmd: 'git --help', type: 'prompt' }
    ];
    
    btns.forEach(function(b) {
        var a = make('a', '', b.label);
        a.onclick = function() {
            kit.say(b.cmd, b.type === 'try' ? 'prompt.try' : 'prompt');
        };
        div.appendChild(a);
    });
    
    app.appendChild(div);
    
    var pre = make('pre', 'git-raw');
    pre.textContent = raw.trim();
    app.appendChild(pre);
}

kit.ear('git', function hear(eve) {
  var s = eve.detail || eve.data || "";
  
  // Use util.js shellReply to clean pager text, then gitFlat() to strip ANSI and handle \r
  var raw = window.shellReply && window.shellReply.clean ? window.shellReply.clean(s) : String(s);
  raw = gitFlat(raw).replace(/[\r\n]+.*(?:\$|#|>)\s*$/, '');
  
  // The first line of the shell output contains the prompt and command executed
  var lines = raw.trim().split('\n');
  var cmdLine = lines[0] || '';
  var cmdMatch = cmdLine.match(/(?:\$|#|>|PS>)\s*(.*)$/);
  var fullCmd = cmdMatch ? cmdMatch[1] : cmdLine;
  
  var isNoRepo = raw.indexOf('fatal: not a git repository') >= 0;
  if (isNoRepo) {
      renderNoRepo(raw);
      hear.off();
      return;
  }
  
  var isConfig = fullCmd.indexOf(' config') >= 0;
  if (isConfig && window.renderConfig) {
      renderConfig(raw, app);
      hear.off();
      return;
  }

  var isDiff = fullCmd.indexOf(' diff') >= 0 || raw.indexOf('diff --git') >= 0;
  var isStatus = /git\s+status/.test(fullCmd) || raw.indexOf('Changes ') >= 0 || raw.indexOf('nothing to commit') >= 0 || raw.indexOf('Untracked files') >= 0;

  if (isDiff && raw.indexOf('@@@DIFF@@@') === -1) {
      renderStandaloneDiff(raw);
  } else if (raw.indexOf('@@@DIFF@@@') >= 0) {
      var parts = raw.split('@@@DIFF@@@');
      renderCombined(parts[0], parts[1]);
  } else if (isStatus) {
      renderStatus(raw);
  } else {
      // Non-status, non-diff git commands (git -v, git log, git branch, etc.)
      renderRaw(raw);
  }
  hear.off();
});

function parseStatus(raw) {
    var lines = raw.split(/\r?\n/);
    var files = [];
    var currentSection = '';

    lines.forEach(function(line) {
        if (!line.trim()) return;
        
        if (line.indexOf('Changes to be committed:') >= 0) { currentSection = 'staged'; return; }
        if (line.indexOf('Changes not staged for commit:') >= 0) { currentSection = 'unstaged'; return; }
        if (line.indexOf('Untracked files:') >= 0) { currentSection = 'untracked'; return; }

        var matchShort = line.match(/^([ MADRCU?!]{2})\s+(.+)$/);
        var matchLong = line.match(/^[\t ]+(?:([a-z ]+):\s+)?(.+)$/);
        var isHint = line.trim().startsWith('(') || line.trim().startsWith('no changes') || line.trim().startsWith('nothing to commit') || line.trim().startsWith('Changes');
        
        var st = '';
        var f = '';

        if (matchShort && !line.match(/^[\t ]/)) {
            st = matchShort[1];
            f = matchShort[2].trim();
        } else if (matchLong && !isHint) {
            var action = matchLong[1] ? matchLong[1].trim() : '';
            var path = matchLong[2].trim();
            f = path.indexOf(' -> ') >= 0 ? path.split(' -> ')[1] : path;
            
            st = ' M';
            if (currentSection === 'staged') {
                if (action.indexOf('modified') >= 0) { st = 'M '; }
                else if (action.indexOf('new file') >= 0) { st = 'A '; }
                else if (action.indexOf('deleted') >= 0) { st = 'D '; }
                else if (action.indexOf('renamed') >= 0) { st = 'R '; }
            } else if (currentSection === 'unstaged') {
                if (action.indexOf('modified') >= 0) { st = ' M'; }
                else if (action.indexOf('deleted') >= 0) { st = ' D'; }
            } else if (currentSection === 'untracked' || !action) {
                st = '??';
            }
        }
        
        if (f && !isHint) {
            if(f.startsWith('"') && f.endsWith('"')) f = f.substring(1, f.length-1);
            var isStaged = (st[0] !== ' ' && st[0] !== '?');
            var kind = 'M';
            if (st.indexOf('?') >= 0) kind = 'Q';
            else if (st.indexOf('A') >= 0) kind = 'A';
            else if (st.indexOf('D') >= 0) kind = 'D';
            
            var display = f;
            if (display.length > 30) {
                var pts = display.split('/');
                if (pts.length > 2) display = '.../' + pts.slice(-2).join('/');
            }
            files.push({ path: f, display: display, staged: isStaged, kind: kind, raw: st });
        }
    });

    var unique = {};
    files.forEach(function(file) {
        if (!unique[file.path]) unique[file.path] = file;
        else {
            unique[file.path].staged = unique[file.path].staged || file.staged;
            if (file.kind !== 'Q') unique[file.path].kind = file.kind; 
        }
    });
    
    return Object.values(unique);
}

function parseDiffs(rawDiff) {
    var lines = rawDiff.split(/\r?\n/);
    var diffs = {};
    var currentFile = null;
    var currentPatch = [];
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('diff --git ')) {
            if (currentFile) diffs[currentFile] = currentPatch.join('\n') + '\n';
            var match = line.match(/ a\/(.*?)\s+b\/(.*)/);
            currentFile = match ? match[2] : null;
            currentPatch = [line];
        } else if (currentFile) {
            currentPatch.push(line);
        }
    }
    if (currentFile) diffs[currentFile] = currentPatch.join('\n') + '\n';
    return diffs;
}

function highlightDiff(text) {
    var lines = text.split('\n');
    var out = [];
    
    var getCommon = function(s1, s2) {
        var pre = 0, suf = 0;
        while(pre < s1.length && pre < s2.length && s1[pre] === s2[pre]) pre++;
        while(suf < s1.length - pre && suf < s2.length - pre && s1[s1.length - 1 - suf] === s2[s2.length - 1 - suf]) suf++;
        return [pre, suf];
    };
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('-') && !line.startsWith('--- ')) {
            out.push({ type: 'del', text: line, raw: line.substring(1), pfx: '-' });
        } else if (line.startsWith('+') && !line.startsWith('+++ ')) {
            var prev = out[out.length - 1];
            if (prev && prev.type === 'del') {
                var addText = line.substring(1);
                var delText = prev.raw;
                var same = getCommon(delText, addText);
                var pre = same[0], suf = same[1];
                if (delText.length - suf > pre || addText.length - suf > pre) {
                    prev.pre = pre; prev.suf = suf;
                    out.push({ type: 'add', text: line, raw: addText, pre: pre, suf: suf, pfx: '+' });
                    continue;
                }
            }
            out.push({ type: 'add', text: line, raw: line.substring(1), pfx: '+' });
        } else if (line.startsWith('@@')) {
            out.push({ type: 'chunk', text: line, pfx: '' });
        } else if (line.startsWith('---') || line.startsWith('+++') || line.startsWith('diff') || line.startsWith('index')) {
            out.push({ type: 'header', text: line, pfx: '' });
        } else {
            var pfx = line.charAt(0) === ' ' ? ' ' : '';
            var r = pfx ? line.substring(1) : line;
            out.push({ type: 'ctx', text: line, raw: r, pfx: pfx });
        }
    }
    
    var html = '';
    for (var i = 0; i < out.length; i++) {
        var o = out[i];
        if (o.type === 'header' || o.type === 'chunk') {
            html += '<span class="line ' + o.type + '">' + esc(o.text) + '</span>\n';
            continue;
        }
        
        var hlContent = '';
        if (o.pre !== undefined) {
            var start = esc(o.raw.substring(0, o.pre));
            var mid = esc(o.raw.substring(o.pre, o.raw.length - o.suf));
            var end = esc(o.raw.substring(o.raw.length - o.suf));
            hlContent = start + '<span class="char-' + o.type + '">' + mid + '</span>' + end;
        } else {
            if (o.raw && o.raw.trim() !== '') {
                try {
                    hlContent = hljs.highlightAuto(o.raw).value;
                } catch(e) { hlContent = esc(o.raw); }
            } else {
                hlContent = esc(o.raw || '');
            }
        }
        
        html += '<span class="line ' + o.type + '"><span class="prefix">' + o.pfx + '</span>' + hlContent + '</span>\n';
    }
    
    if (html.endsWith('\n')) html = html.slice(0, -1);
    return html;
}

function createEditor(file, initialDiff) {
    var wrap = document.createElement('div');
    wrap.className = 'editor-wrapper';
    
    var pre = document.createElement('pre');
    var code = document.createElement('code');
    code.setAttribute('contenteditable', 'true');
    code.spellcheck = false;
    
    if (!initialDiff) {
        initialDiff = "diff --git a/"+file+" b/"+file+"\n--- a/"+file+"\n+++ b/"+file+"\n@@ -0,0 +0,0 @@\n // Loading diff in a new card below...";
    }
    
    fill(code, highlightDiff(initialDiff));
    pre.appendChild(code);
    wrap.appendChild(pre);
    
    var saveTimer;
    $(code).keyup(function(e) {
        var r = monotype(code[0]);
        var txt = $(code).text();
        fill(code, highlightDiff(txt));
        r.restore();
        
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function() {
            var cmd = "cat << 'EOF_PATCH' | git apply --whitespace=nowarn\n" + txt + "\nEOF_PATCH";
            window.parent.kit.say(cmd, 'host');
        }, 1500);
    }).keydown(function(e) {
        var prevent = { '13': '\n', '9': '    ' };
        if(e.keyCode in prevent){
            e.preventDefault();
            var r = monotype(code[0]);
            var txt = $(code).text();
            var out = txt.slice(0, r.s) + prevent[e.keyCode] + txt.slice(r.e);
            fill(code, highlightDiff(out));
            r.e = r.s + prevent[e.keyCode].length;
            r.s = r.e;
            r.restore();
            
            clearTimeout(saveTimer);
            saveTimer = setTimeout(function() {
                var cmd = "cat << 'EOF_PATCH' | git apply --whitespace=nowarn\n" + out + "\nEOF_PATCH";
                window.parent.kit.say(cmd, 'host');
            }, 1500);
        }
    });
    
    return { wrapper: wrap, code: code };
}

function renderRaw(raw) {
    var lines = raw.split(/\r?\n/);
    // Skip the command echo line (first line with prompt)
    var output = lines.slice(1).join('\n').trim();
    if (!output) output = raw.trim();
    var pre = make('pre', 'git-raw');
    pre.textContent = output;
    app.replaceChildren(pre);
}

function renderStandaloneDiff(raw) {
    var diffs = parseDiffs(raw);
    for (var f in diffs) {
        var existingRow = document.querySelector('.file-row[data-path="' + f.replace(/"/g, '\\"') + '"]');
        if (existingRow) {
            var w = existingRow.nextSibling;
            var code = w.querySelector('code');
            fill(code, highlightDiff(diffs[f]));
            w.classList.add('active');
            existingRow.querySelector('.twirl').classList.add('open');
            continue;
        }

        var ed = createEditor(f, diffs[f]);
        ed.wrapper.classList.add('active');
        var row = makeRow(f, 1);
        
        row.onclick = function() {
            var w = this.nextSibling;
            w.classList.toggle('active');
            this.querySelector('.twirl').classList.toggle('open');
        };
        
        app.appendChild(row);
        app.appendChild(ed.wrapper);
    }
}

function renderStatus(raw) {
    var files = parseStatus(raw);
    if (files.length === 0) {
        var empty = make('div', 'git-note', 'Working tree clean.');
        app.replaceChildren(empty);
        return;
    }
    
    files.forEach(function(f) {
        var row = makeRow(f, 0);
        var ed = createEditor(f.path, '');
        
        row.querySelector('.stage-toggle').onclick = function(e) {
            e.stopPropagation();
            var isStaged = this.classList.contains('checked');
            var cmd = isStaged ? 'git restore --staged "' + f.path + '"' : 'git add "' + f.path + '"';
            window.parent.kit.say(cmd, 'host');
            this.classList.toggle('checked');
        };
        
        row.onclick = function(e) {
            if (e.target.classList.contains('stage-toggle')) return;
            var w = this.nextSibling;
            var t = this.querySelector('.twirl');
            
            if (w.classList.contains('active')) {
                w.classList.remove('active');
                t.classList.remove('open');
            } else {
                w.classList.add('active');
                t.classList.add('open');
                
                var code = w.querySelector('code');
                if (code.textContent.indexOf('// Loading diff in a new card below...') >= 0) {
                    var diffFlag = f.staged ? '--cached' : '';
                    window.parent.kit.say('git --no-pager diff ' + diffFlag + ' "' + f.path + '"', 'prompt');                }
            }
        };
        
        app.appendChild(row);
        app.appendChild(ed.wrapper);
    });
}

function renderCombined(statusRaw, diffRaw) {
    var files = parseStatus(statusRaw);
    var diffs = parseDiffs(diffRaw);
    
    if (files.length === 0) {
        var empty = make('div', 'git-note', 'Working tree clean.');
        app.replaceChildren(empty);
        return;
    }
    
    files.forEach(function(f) {
        var row = makeRow(f, 0);
        var ed = createEditor(f.path, diffs[f.path] || '');
        
        row.querySelector('.stage-toggle').onclick = function(e) {
            e.stopPropagation();
            var isStaged = this.classList.contains('checked');
            var cmd = isStaged ? 'git restore --staged "' + f.path + '"' : 'git add "' + f.path + '"';
            window.parent.kit.say(cmd, 'host');
            this.classList.toggle('checked');
        };
        
        row.onclick = function(e) {
            if (e.target.classList.contains('stage-toggle')) return;
            var w = this.nextSibling;
            var t = this.querySelector('.twirl');
            
            if (w.classList.contains('active')) {
                w.classList.remove('active');
                t.classList.remove('open');
            } else {
                w.classList.add('active');
                t.classList.add('open');
                
                var code = w.querySelector('code');
                if (code.textContent.indexOf('// Loading diff in a new card below...') >= 0) {
                    var diffFlag = f.staged ? '--cached' : '';
                    window.parent.kit.say('git --no-pager diff ' + diffFlag + ' "' + f.path + '"', 'prompt');                }
            }
        };
        
        app.appendChild(row);
        app.appendChild(ed.wrapper);
    });
}
</script>
