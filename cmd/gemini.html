<link rel="stylesheet" href="../gun/kit/web.css">
<script src="../gun/kit/web.js"></script>

<div class="box">
  <div class="bar">
    <span class="tag">gemini</span>
    <span id="hd" class="val"></span>
    <span id="sid" class="id"></span>
  </div>
  <div id="bod" class="bod"></div>
</div>

<!-- templates -->
<div class="model">
  <pre class="tpl txt blk"></pre>
  <div class="tpl thk"><p class="tog">&#9654; thinking</p><pre class="inn blk"></pre></div>
  <pre class="tpl fail blk"></pre>
</div>

<style>
body { display: block; min-height: 0; overflow: hidden; }
.bar { display: flex; align-items: center; gap: 0.5em; padding: 0.4em 0.8em; border-bottom: 1px solid var(--pop); flex-shrink: 0; }
.val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 900; }
.id { font-size: 0.6em; opacity: 0.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 10em; cursor: pointer; }
.bod { padding: 0.6em; display: block; }
.bod > * { display: block; margin-bottom: 0.6em; }
.blk { white-space: pre-wrap; word-break: break-word; margin: 0; font-family: 'Courier New', monospace; font-size: 0.85em; text-align: left; }
.thk { border-left: 2px solid var(--pop); padding-left: 0.6em; opacity: 0.55; display: block; }
.thk .inn { display: none; }
.thk.open .inn { display: block; }
.tog { font-size: 0.8em; opacity: 0.7; cursor: pointer; margin: 0; user-select: none; display: block; }
.run { display: block; border-left: 2px solid color-mix(in srgb, var(--pop) 40%, transparent); margin: 0.3em 0; overflow: hidden; }
.run.ok { border-left-color: color-mix(in srgb, var(--pop) 70%, transparent); }
.rlb { font-family: 'Courier New', monospace; font-size: 0.75em; padding: 0.2em 0.6em; margin: 0; opacity: 0.6; cursor: pointer; user-select: none; display: block; text-align: left; }
.rlb:active { opacity: 1; }
.rout { padding: 0.3em 0.6em; display: none; opacity: 0.7; font-size: 0.8em; max-height: 12em; overflow-y: auto; }
.run.open .rout { display: block; }
.fail { color: var(--err); }
.usr { opacity: 0.6; border-top: 1px solid color-mix(in srgb, var(--pop) 30%, transparent); padding: 0.4em 0; margin-top: 0.4em; display: block; }
</style>

<script src="../util.js"></script>
<script>;(function(){

var hd  = B.all('#hd')[0];
var sid = B.all('#sid')[0];
var bod = B.all('#bod')[0];
sid.onclick = function(){ if(GEM.sid) kit.up('gemini --resume '+GEM.sid+' ', 'prompt.try') };

var GEM = {};
GEM.sid = null;
GEM.on  = 0;
GEM.textEl = null;
GEM.thinkEl = null;
GEM.toolEls = {};

GEM.send = function(txt){
  if(GEM.on){ return }
  GEM.on = 1;
  GEM.textEl = null; GEM.thinkEl = null; GEM.toolEls = {};
  var msg = {type: 'gemini', prompt: txt};
  if(GEM.sid){ msg.session = GEM.sid }
  if(GEM.cwd){ msg.cwd = GEM.cwd }
  kit.up(msg, 'host');
};

GEM.got = function(m){
  if(m.type === 'gemini-event'){ GEM.evt(m.data); return }
  if(m.type === 'gemini-done'){
    GEM.on = 0;
    if(m.sessionId) GEM.sid = m.sessionId;
    if(GEM.sid){ sid.textContent = GEM.sid.slice(0,8); sid.title = 'click to copy: '+GEM.sid }
    kit.up(GEM.sid, 'gemini-session');
    kit.say({}, 'style');
  }
};

GEM.evt = function(u){
  var t = u.sessionUpdate || '';

  if(t === 'session-init'){ GEM.sid = u.sessionId; return }

  if(t === 'agent_message_chunk'){
    var txt = (u.content||{}).text || '';
    if(!txt){ return }
    if(!GEM.textEl){
      GEM.textEl = B.all('.tpl.txt')[0].cloneNode(true);
      GEM.textEl.classList.remove('tpl'); GEM.textEl.textContent = '';
      GEM.textEl._buf = '';
      bod.append(GEM.textEl);
    }
    GEM.textEl._buf += txt;
    GEM.textEl.textContent = GEM.textEl._buf;
    kit.say({}, 'style');
    return;
  }

  if(t === 'agent_thought_chunk'){
    var txt = (u.content||{}).text || '';
    if(!txt){ return }
    if(!GEM.thinkEl){
      GEM.thinkEl = B.all('.tpl.thk')[0].cloneNode(true);
      GEM.thinkEl.classList.remove('tpl');
      GEM.thinkEl.querySelector('.tog').onclick = function(){ GEM.thinkEl.classList.toggle('open') };
      GEM.thinkEl._buf = '';
      bod.append(GEM.thinkEl);
    }
    GEM.thinkEl._buf += txt;
    GEM.thinkEl.querySelector('.inn').textContent = GEM.thinkEl._buf;
    kit.say({}, 'style');
    return;
  }

  if(t === 'tool_call'){
    var id = u.toolCallId || '';
    var v = Tool.mk(bod, id, {title: u.title, kind: u.kind});
    if(v) GEM.toolEls[id] = v;
    GEM.textEl = null;
    GEM.thinkEl = null;
    return;
  }

  if(t === 'tool_call_update'){
    var id = u.toolCallId || '';
    var v = GEM.toolEls[id];
    if(!v){ return }
    // content is array: [{type:"content", content:{type:"text", text:"..."}}]
    var out = '';
    (u.content||[]).forEach(function(c){ out += ((c.content||{}).text || '') });
    if(!out) out = u.output || u.result || '';
    if(typeof out !== 'string') out = JSON.stringify(out, null, 2);
    Tool.out(v, out);
    Tool.done(v);
    GEM.textEl = null;
    GEM.thinkEl = null;
    return;
  }

  if(t === 'available_commands_update' || t === 'current_mode_update' || t === 'usage_update' || t === 'session_info_update' || t === 'config_option_update'){ return }
};

GEM.fail = function(t){
  var v = B.all('.tpl.fail')[0].cloneNode(true);
  v.classList.remove('tpl'); v.textContent = t;
  bod.append(v); kit.say({}, 'style');
};

GEM.usr = function(txt){
  var u = B.new('pre');
  u.className = 'usr blk';
  u.textContent = '> ' + txt;
  bod.append(u);
  kit.say({}, 'style');
};

kit.ear('gemini', function(eve){
  var d = eve.detail || eve.data || {};

  if(d.type && d.type.indexOf('gemini') === 0){ GEM.got(d); return }

  var raw = typeof d === 'string' ? d : (d.prompt || '');
  var s = typeof d === 'object' ? (d.session || null) : null;
  var cwd = typeof d === 'object' ? (d.cwd || '') : '';
  var txt = raw.replace(/^gemini\s*/i, '').trim();
  if(!txt){ return }
  if(cwd){ GEM.cwd = cwd }
  if(s){ GEM.sid = s }

  GEM.usr(txt);
  GEM.send(txt);
});

}());</script>
