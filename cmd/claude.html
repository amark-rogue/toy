<link rel="stylesheet" href="../gun/kit/web.css">
<script src="../gun/kit/web.js"></script>

<div id="hd"></div>
<div id="bod"></div>

<!-- templates -->
<div class="hide">
  <pre class="tpl txt blk"></pre>
  <div class="tpl thk"><p class="tog">&#9654; thinking</p><pre class="inn blk"></pre></div>
  <div class="tpl tol"><p class="top"></p><pre class="out blk"></pre></div>
  <pre class="tpl fail blk"></pre>
</div>

<style>
*{box-sizing:border-box; animation:none !important}
html,body{margin:0;padding:0;background:transparent !important;color:var(--pop);font-family:'Courier New',monospace;display:block !important;place-items:unset !important;min-height:0 !important}
#hd{padding:0.4em 0.6em;opacity:0.5;font-size:0.85em;border-bottom:1px solid var(--pop);word-break:break-all;display:block !important;place-items:unset !important;position:static !important;min-height:0 !important}
#bod{padding:0.6em;display:block !important;place-items:unset !important;position:static !important;min-height:0 !important}
#bod>*{display:block !important;place-items:unset !important;position:static !important;min-height:0 !important;margin-bottom:0.6em}
.blk{white-space:pre-wrap;word-break:break-all;margin:0}
.thk{border-left:2px solid var(--pop);padding-left:0.6em;opacity:0.55}
.thk .inn{display:none !important}
.thk.open .inn{display:block !important}
.tog{font-size:0.8em;opacity:0.7;cursor:pointer;margin:0;user-select:none;display:block !important}
.tol{border:1px solid var(--pop);border-radius:0.4em;overflow:hidden !important}
.top{padding:0.3em 0.6em;font-size:0.8em;opacity:0.7;cursor:pointer;margin:0;display:block !important}
.out{padding:0.5em 0.6em;display:none !important;opacity:0.8;font-size:0.9em}
.tol.open .out{display:block !important}
.fail{color:#f66}
.hide{display:none !important}
</style>

<script src="../util.js"></script>
<script>;(function(){

var hd  = B.all('#hd')[0];
var bod = B.all('#bod')[0];

var CLD = {};
CLD.sid = null;
CLD.ws  = null;
CLD.on  = 0;

CLD.key = function(){
  var p = window.parent;
  try{ if(p.localStorage.pass) return p.localStorage.pass }catch(e){}
  var v = window.prompt('shell password?');
  try{ p.localStorage.pass = v }catch(e){}
  return v;
};

CLD.open = function(cb){
  CLD.ws = new WebSocket('ws://'+(location.hostname||'localhost')+':8022');
  CLD.ws.onopen = function(){ CLD.ws.send(CLD.key()); setTimeout(cb, 100) };
  CLD.ws.onerror = function(){ CLD.fail('WS error') };
};

CLD.send = function(txt){
  if(CLD.on || !CLD.ws || CLD.ws.readyState !== 1) return;
  CLD.on = 1;
  var msg = {type:'claude', prompt:txt};
  if(CLD.sid) msg.session = CLD.sid;
  CLD.ws.send(JSON.stringify(msg));
  CLD.ws.onmessage = CLD.got;
};

CLD.got = function(e){
  var m = JSON.parse(e.data);
  if(m.type === 'claude-event') return CLD.evt(m.data);
  if(m.type === 'claude-done'){
    CLD.on = 0;
    kit.up(CLD.sid, 'claude-session');
    kit.up(0, 'claude-ready');
    kit.say({},'style');
  }
};

CLD.blocks = {}; // track streaming content blocks by index

CLD.evt = function(ev){
  if(ev.type === 'system' && ev.subtype === 'init'){ CLD.sid = ev.session_id; return }
  if(ev.type === 'assistant') CLD.msg(ev.message);
  if(ev.type === 'result') return; // turn complete
  if(ev.type === 'stream_event') CLD.stream(ev);
  if(ev.type === 'error') CLD.fail(ev.text||ev.message||JSON.stringify(ev));
};

CLD.stream = function(ev){
  var se = ev.stream_event || ev;
  var t = se.type || '';
  if(t === 'content_block_start'){
    var idx = se.index;
    var blk = se.content_block || {};
    if(blk.type === 'text'){
      var v = B.all('.tpl.txt')[0].cloneNode(true);
      v.classList.remove('tpl'); v.textContent = '';
      bod.append(v);
      CLD.blocks[idx] = {el:v, type:'text', text:''};
    } else if(blk.type === 'thinking'){
      var v = B.all('.tpl.thk')[0].cloneNode(true);
      v.classList.remove('tpl');
      v.querySelector('.tog').onclick = function(){ v.classList.toggle('open') };
      bod.append(v);
      CLD.blocks[idx] = {el:v, type:'thinking', text:''};
    }
    kit.say({},'style');
  }
  if(t === 'content_block_delta'){
    var idx = se.index;
    var d = se.delta || {};
    var b = CLD.blocks[idx];
    if(!b) return;
    if(d.type === 'text_delta' && d.text){
      b.text += d.text;
      b.el.textContent = b.text;
    }
    if(d.type === 'thinking_delta' && d.thinking){
      b.text += d.thinking;
      b.el.querySelector('.inn').textContent = b.text;
    }
    kit.say({},'style');
  }
  if(t === 'content_block_stop'){
    delete CLD.blocks[se.index];
  }
};

CLD.msg = function(msg){
  // full assistant message (non-streaming fallback)
  if(Object.keys(CLD.blocks).length) return; // skip if we streamed it
  (msg.content||[]).forEach(function(blk){
    if(blk.type === 'text')     CLD.text(blk.text);
    if(blk.type === 'thinking') CLD.think(blk.thinking);
    if(blk.type === 'tool_use') CLD.tool(blk.name, blk.input);
  });
};

CLD.text = function(t){
  var v = B.all('.tpl.txt')[0].cloneNode(true);
  v.classList.remove('tpl'); v.textContent = t;
  bod.append(v); kit.say({},'style');
};

CLD.think = function(t){
  var v = B.all('.tpl.thk')[0].cloneNode(true);
  v.classList.remove('tpl');
  v.querySelector('.inn').textContent = t;
  v.querySelector('.tog').onclick = function(){ v.classList.toggle('open') };
  bod.append(v); kit.say({},'style');
};

CLD.tool = function(name, inp){
  var v = B.all('.tpl.tol')[0].cloneNode(true);
  v.classList.remove('tpl');
  var top = v.querySelector('.top');
  top.textContent = name+' \u25B6';
  v.querySelector('.out').textContent = typeof inp === 'string' ? inp : JSON.stringify(inp,null,2);
  top.onclick = function(){
    v.classList.toggle('open');
    top.textContent = name+(v.classList.contains('open')?' \u25BC':' \u25B6');
  };
  bod.append(v); kit.say({},'style');
};

CLD.fail = function(t){
  var v = B.all('.tpl.fail')[0].cloneNode(true);
  v.classList.remove('tpl'); v.textContent = t;
  bod.append(v); kit.say({},'style');
};

// listen for prompts (initial + follow-ups)
kit.ear('claude', function(eve){
  var d = eve.detail || eve.data || {};
  var raw = typeof d === 'string' ? d : (d.prompt || '');
  var sid = typeof d === 'object' ? (d.session || null) : null;
  var txt = raw.replace(/^claude\s*/i,'').trim();
  if(!txt) return;

  // show user message for follow-ups (not the first one, parent shows that)
  if(CLD.sid){
    var u = B.new('pre');
    u.style.cssText = 'opacity:0.6;border-bottom:1px solid var(--pop);padding-bottom:0.3em;margin-bottom:0.3em;display:block !important;place-items:unset !important;position:static !important;min-height:0 !important';
    u.textContent = '> ' + txt;
    bod.append(u);
  }

  hd.textContent = txt;
  if(sid) CLD.sid = sid;
  if(CLD.ws){ CLD.send(txt) } else { CLD.open(function(){ CLD.send(txt) }) }
});

}());</script>
