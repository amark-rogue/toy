<link rel="stylesheet" href="../gun/kit/web.css">
<script src="../gun/kit/web.js"></script>

<div class="box">
  <div class="bar">
    <span class="tag">claude</span>
    <span id="hd" class="val"></span>
  </div>
  <div id="bod" class="bod"></div>
</div>

<!-- templates -->
<div class="model">
  <pre class="tpl txt blk"></pre>
  <div class="tpl thk"><p class="tog">&#9654; thinking</p><pre class="inn blk"></pre></div>
  <div class="tpl tol"><p class="top"></p><pre class="tou blk"></pre></div>
  <pre class="tpl fail blk"></pre>
</div>

<style>
body { display: block; min-height: 0; overflow: hidden; }
.bod { padding: 0.6em; display: block; }
.bod > * { display: block; margin-bottom: 0.6em; }
.blk { white-space: pre-wrap; word-break: break-word; margin: 0; font-family: 'Courier New', monospace; font-size: 0.85em; text-align: left; }
.thk { border-left: 2px solid var(--pop); padding-left: 0.6em; opacity: 0.55; display: block; }
.thk .inn { display: none; }
.thk.open .inn { display: block; }
.tog { font-size: 0.8em; opacity: 0.7; cursor: pointer; margin: 0; user-select: none; display: block; }
.tol { border: 1px solid var(--pop); border-radius: 0.4em; overflow: hidden; display: block; }
.top { padding: 0.3em 0.6em; font-size: 0.8em; opacity: 0.7; cursor: pointer; margin: 0; display: block; }
.tou { padding: 0.5em 0.6em; display: none; opacity: 0.8; font-size: 0.9em; }
.tol.open .tou { display: block; }
.fail { color: var(--err); }
.usr { opacity: 0.6; border-bottom: 1px solid var(--pop); padding-bottom: 0.3em; margin-bottom: 0.3em; display: block; }
</style>

<script src="../util.js"></script>
<script>;(function(){

var hd  = B.all('#hd')[0];
var bod = B.all('#bod')[0];

var CLD = {};
CLD.sid = null;
CLD.on  = 0;
CLD.blocks = {};

CLD.send = function(txt){
  if(CLD.on){ return }
  CLD.on = 1;
  var msg = {type: 'claude', prompt: txt};
  if(CLD.sid){ msg.session = CLD.sid }
  if(CLD.cwd){ msg.cwd = CLD.cwd }
  kit.up(msg, 'host');
};

CLD.got = function(m){
  if(m.type === 'claude-event'){ CLD.evt(m.data); return }
  if(m.type === 'claude-done'){
    CLD.on = 0;
    kit.up(CLD.sid, 'claude-session');
    kit.say({}, 'style');
  }
};

CLD.evt = function(ev){
  if(ev.type === 'system' && ev.subtype === 'init'){ CLD.sid = ev.session_id; return }
  if(ev.type === 'assistant'){ CLD.msg(ev.message) }
  if(ev.type === 'result'){ return }
  if(ev.type === 'stream_event'){ CLD.stream(ev) }
  if(ev.type === 'error'){ CLD.fail(ev.text || ev.message || JSON.stringify(ev)) }
};

CLD.stream = function(ev){
  var se = ev.stream_event || ev;
  var t = se.type || '';
  if(t === 'content_block_start'){
    var idx = se.index;
    var blk = se.content_block || {};
    if(blk.type === 'text'){
      var v = B.all('.tpl.txt')[0].cloneNode(true);
      v.classList.remove('tpl'); v.textContent = '';
      bod.append(v);
      CLD.blocks[idx] = {el: v, type: 'text', text: ''};
    } else if(blk.type === 'thinking'){
      var v = B.all('.tpl.thk')[0].cloneNode(true);
      v.classList.remove('tpl');
      v.querySelector('.tog').onclick = function(){ v.classList.toggle('open') };
      bod.append(v);
      CLD.blocks[idx] = {el: v, type: 'thinking', text: ''};
    }
    kit.say({}, 'style');
  }
  if(t === 'content_block_delta'){
    var idx = se.index;
    var d = se.delta || {};
    var b = CLD.blocks[idx];
    if(!b){ return }
    if(d.type === 'text_delta' && d.text){
      b.text += d.text;
      b.el.textContent = b.text;
    }
    if(d.type === 'thinking_delta' && d.thinking){
      b.text += d.thinking;
      b.el.querySelector('.inn').textContent = b.text;
    }
    kit.say({}, 'style');
  }
  if(t === 'content_block_stop'){
    delete CLD.blocks[se.index];
  }
};

CLD.msg = function(msg){
  if(Object.keys(CLD.blocks).length){ return }
  (msg.content || []).forEach(function(blk){
    if(blk.type === 'text'){ CLD.text(blk.text) }
    if(blk.type === 'thinking'){ CLD.think(blk.thinking) }
    if(blk.type === 'tool_use'){ CLD.tool(blk.name, blk.input) }
  });
};

CLD.text = function(t){
  var v = B.all('.tpl.txt')[0].cloneNode(true);
  v.classList.remove('tpl'); v.textContent = t;
  bod.append(v); kit.say({}, 'style');
};

CLD.think = function(t){
  var v = B.all('.tpl.thk')[0].cloneNode(true);
  v.classList.remove('tpl');
  v.querySelector('.inn').textContent = t;
  v.querySelector('.tog').onclick = function(){ v.classList.toggle('open') };
  bod.append(v); kit.say({}, 'style');
};

CLD.tool = function(name, inp){
  var v = B.all('.tpl.tol')[0].cloneNode(true);
  v.classList.remove('tpl');
  var top = v.querySelector('.top');
  top.textContent = name + ' \u25B6';
  v.querySelector('.tou').textContent = typeof inp === 'string' ? inp : JSON.stringify(inp, null, 2);
  top.onclick = function(){
    v.classList.toggle('open');
    top.textContent = name + (v.classList.contains('open') ? ' \u25BC' : ' \u25B6');
  };
  bod.append(v); kit.say({}, 'style');
};

CLD.fail = function(t){
  var v = B.all('.tpl.fail')[0].cloneNode(true);
  v.classList.remove('tpl'); v.textContent = t;
  bod.append(v); kit.say({}, 'style');
};

// receive prompts and responses
kit.ear('claude', function(eve){
  var d = eve.detail || eve.data || {};

  // response from server routed by chat.html
  if(d.type && d.type.indexOf('claude') === 0){ CLD.got(d); return }

  // prompt from chat.html
  var raw = typeof d === 'string' ? d : (d.prompt || '');
  var sid = typeof d === 'object' ? (d.session || null) : null;
  var cwd = typeof d === 'object' ? (d.cwd || '') : '';
  var txt = raw.replace(/^claude\s*/i, '').trim();
  if(!txt){ return }
  if(cwd){ CLD.cwd = cwd }

  if(CLD.sid){
    var u = B.new('pre');
    u.className = 'usr blk';
    u.textContent = '> ' + txt;
    bod.append(u);
  }

  hd.textContent = txt;
  if(sid){ CLD.sid = sid }
  CLD.send(txt);
});

}());</script>
