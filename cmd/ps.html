<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div class="box">
  <div class="bar">
    <span class="tag">tasks</span>
  </div>
  <div id="out" class="out procs"></div>
</div>
<div id="rowTpl" class="proc model">
  <span class="pid"></span>
  <span class="pname"></span>
  <button class="kill">kill</button>
</div>
<style>
body { display: block; }
.procs { display: flex; flex-direction: column; gap: 0; }
.proc { display: flex; align-items: center; gap: 0.5em; padding: 0.35em 0; border-bottom: 1px solid color-mix(in srgb, var(--pop) 15%, transparent); font-family: 'Courier New', monospace; }
.pid { font-weight: bold; width: 3.5em; flex-shrink: 0; font-size: 0.85em; opacity: 0.7; }
.pname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85em; }
.kill { flex-shrink: 0; border: 1px solid var(--err); color: var(--err); padding: 0.15em 0.5em; cursor: pointer; font-family: 'Courier New', monospace; font-size: 0.75em; border-radius: 4px; background: transparent; }
.kill:active { background: var(--err); color: black; }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('ps', function hear(eve) {
  var s = (eve.detail || eve.data || '').flat().trim().split('\n');
  var tpl = B.all('#rowTpl')[0];
  var out = B.all('#out')[0];
  var lines = s.slice(1);
  if(lines.length && lines[0].includes('PID')) lines = lines.slice(1);
  lines.forEach(function(l) {
    l = l.trim(); if(!l) return;
    var p = l.split(/\s+/);
    var pid = p[0]; if(isNaN(parseInt(pid))) pid = p[1];
    var name = p.slice(3).join(' ') || p.join(' ');
    var row = tpl.cloneNode(true);
    row.id = ''; row.classList.remove('model');
    row.all('.pid')[0].textContent = pid;
    row.all('.pname')[0].textContent = name;
    row.all('.kill')[0].onclick = function(){ kit.say('kill -9 '+pid,'prompt.try') };
    out.append(row);
  });
  out.scrollTop = out.scrollHeight;
  hear.off();
});
</script>
