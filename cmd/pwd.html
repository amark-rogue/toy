<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div class="box">
  <div class="bar">
    <span class="tag">pwd</span>
  </div>
  <div id="content" class="crumbs"></div>
</div>
<style>
body { display: block; min-height: 0; overflow: hidden; }
.crumbs { display: flex; flex-wrap: wrap; gap: 0.3em; padding: 0.5em 0.8em; font-family: 'Courier New', monospace; font-weight: 900; }
.crumb { display: inline-flex; align-items: center; font-size: 0.7em; letter-spacing: 0.2em; text-transform: uppercase; background: color-mix(in srgb, var(--pop) 10%, transparent); border: 1px dashed color-mix(in srgb, var(--pop) 50%, transparent); border-radius: 0.5em; padding: 0.25em 0.8em; color: var(--pop); cursor: pointer; }
.crumb:active { background: var(--pop); color: var(--mood, black); }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('pwd', function hear(eve) {
  var s = eve.detail || eve.data || "";
  var lines = s.flat().trim().split('\n');
  var path = lines[lines.length - 1].trim(); // Last line is the path output usually
  
  if (path) {
    var parts = path.split('/').filter(Boolean);
    content.replaceChildren();
    
    if (path.startsWith('/')) {
      var root = B.new('div'); root.className = 'crumb'; root.textContent = '/';
      root.onclick = ()=>{ kit.say('cd /', 'prompt'); };
      content.appendChild(root);
    }
    
    var currentPath = path.startsWith('/') ? '' : '.';
    parts.forEach((p)=>{
      currentPath += '/' + p;
      var targetPath = currentPath;
      var crumb = B.new('div');
      crumb.className = 'crumb';
      crumb.textContent = p;
      crumb.onclick = ()=>{ kit.say('cd ' + targetPath, 'prompt'); };
      content.appendChild(crumb);
    });
  } else {
    content.textContent = "UNKNOWN PATH";
  }
  hear.off();
});
</script>
