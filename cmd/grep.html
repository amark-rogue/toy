<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div class="box">
  <div class="bar">
    <span class="tag">grep</span>
    <span id="query" class="val"></span>
  </div>
  <div id="out" class="out hits"></div>
</div>
<div id="hitTpl" class="hit model"></div>
<style>
body { display: block; min-height: 0; overflow: hidden; }
.hits { display: flex; flex-direction: column; gap: 0.2em; }
.hit { display: block; padding: 0.4em 0.6em; border-left: 2px solid var(--pop); font-family: 'Courier New', monospace; font-size: 0.85em; word-break: break-word; white-space: pre-wrap; cursor: pointer; opacity: 0.85; text-align: left; }
.hit:active { opacity: 0.5; }
.hit.none { opacity: 0.4; cursor: default; border-left-color: color-mix(in srgb, var(--pop) 30%, transparent); }
mark { font-weight: bold; background: var(--pop); color: var(--mood, black); padding: 0 0.15em; font-style: normal; border-radius: 0.15em; }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('grep', function hear(eve) {
  var s = (eve.detail || eve.data || '').flat().trim().split('\n');
  var m = s[0].match(/grep\s+(?:-[a-zA-Z]+\s+)?['"]?([^'"]+)['"]?/);
  var term = m ? m[1] : '?';
  var tpl = B.all('#hitTpl')[0];
  var out = B.all('#out')[0];
  B.all('#query')[0].textContent = term;
  var lines = s.slice(1).filter(function(l){ return l.trim() });
  if(!lines.length) {
    var empty = tpl.cloneNode(true);
    empty.id = ''; empty.classList.remove('model'); empty.classList.add('none');
    empty.textContent = 'no matches';
    out.append(empty);
  } else {
    lines.forEach(function(l) {
      var item = tpl.cloneNode(true);
      item.id = ''; item.classList.remove('model');
      item.textContent = '';
      l.split(new RegExp('('+term+')', 'gi')).forEach(function(p) {
        if(p.toLowerCase() === term.toLowerCase()) {
          var mk = B.new('mark'); mk.textContent = p; item.append(mk);
        } else { item.append(document.createTextNode(p)); }
      });
      var fm = l.match(/^([^:]+):/);
      if(fm) { item.onclick = function(){ kit.say('cat ' + fm[1], 'prompt.try') } }
      out.append(item);
    });
  }
  out.scrollTop = out.scrollHeight;
  hear.off();
});
</script>
