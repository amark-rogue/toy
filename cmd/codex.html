<link rel="stylesheet" href="../gun/kit/web.css">
<script src="../gun/kit/web.js"></script>

<div class="box">
  <div class="bar">
    <span class="tag">codex</span>
    <span id="lab" class="val"></span>
    <button id="stop" class="mini" type="button">stop</button>
  </div>
  <div id="bod" class="bod"></div>
  <form id="ask" class="ask">
    <textarea id="txt" rows="2" autocomplete="off" autocapitalize="sentences" spellcheck="true"></textarea>
    <button id="go" type="submit">send</button>
    <button id="ins" type="button" class="hide">install</button>
  </form>
</div>

<div class="model">
  <pre class="tpl msg blk"></pre>
  <pre class="tpl usr blk"></pre>
  <pre class="tpl fail blk"></pre>
</div>

<style>
body { display: block; min-height: 0; overflow: hidden; }
.box { display: flex; flex-direction: column; min-height: 0; }
.bar { display: flex; align-items: center; gap: 0.5em; padding: 0.4em 0.8em; border-bottom: 1px solid var(--pop); flex-shrink: 0; }
.val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 900; }
.bod { padding: 0.6em; display: block; }
.bod > * { display: block; margin-bottom: 0.6em; }
.blk { white-space: pre-wrap; word-break: break-word; margin: 0; font-family: 'Courier New', monospace; font-size: 0.88em; text-align: left; }
.usr { opacity: 0.6; border-top: 1px solid color-mix(in srgb, var(--pop) 30%, transparent); padding-top: 0.45em; }
.fail { color: var(--err); }
.ask { display: flex; gap: 0.45em; padding: 0.55em; border-top: 1px solid color-mix(in srgb, var(--pop) 30%, transparent); align-items: stretch; }
textarea { flex: 1; min-width: 0; resize: none; color: inherit; background: transparent; border: 1px solid color-mix(in srgb, var(--pop) 45%, transparent); border-radius: 0.45em; padding: 0.55em; font: inherit; min-height: 3.1em; }
button { color: inherit; background: transparent; border: 1px solid var(--pop); border-radius: 0.45em; padding: 0.45em 0.7em; font: inherit; font-weight: 900; min-width: 4.7em; touch-action: manipulation; }
.mini { min-width: 3.8em; font-size: 0.78em; opacity: 0.7; }
.hide { display: none; }
</style>

<script src="../util.js"></script>
<script>;(function(){

var bod = B.all('#bod')[0];
var lab = B.all('#lab')[0];
var ask = B.all('#ask')[0];
var txt = B.all('#txt')[0];
var go  = B.all('#go')[0];
var ins = B.all('#ins')[0];
var stop = B.all('#stop')[0];
var CDX = {};

CDX.job = '';
CDX.tid = '';
CDX.on = 0;
CDX.out = null;

CDX.add = function(cls, text){
  var v = B.all('.tpl.' + cls)[0].cloneNode(true);
  v.classList.remove('tpl');
  v.textContent = text || '';
  bod.append(v);
  kit.say({}, 'style');
  return v;
};

CDX.user = function(text){
  CDX.add('usr', '> ' + text);
};

CDX.say = function(text){
  if(!CDX.out){ CDX.out = CDX.add('msg', '') }
  CDX.out.textContent += text || '';
  kit.say({}, 'style');
};

CDX.send = function(text, act){
  var msg = {'^': './cmd/codex.js', '#': CDX.job || '1'};
  if(text){ msg.$ = text }
  if(act){ msg.act = act }
  if(CDX.tid){ msg.thread = CDX.tid }
  if(localStorage.cwd){ msg.cwd = localStorage.cwd }
  CDX.on = 1;
  go.disabled = true;
  kit.up(msg, 'host');
};

CDX.done = function(){
  CDX.on = 0;
  go.disabled = false;
  txt.value = '';
  CDX.fit();
  kit.say({}, 'style');
};

CDX.got = function(obj){
  if(obj.thread){ CDX.tid = obj.thread; lab.textContent = CDX.tid.slice(0, 8) }
  if(obj.need === 'codex'){ ins.classList.remove('hide') }
  if(obj.$){ CDX.say(obj.$) }
  if(obj.done){ CDX.done() }
};

CDX.fit = function(){
  txt.style.height = 'auto';
  txt.style.height = txt.scrollHeight + 'px';
};

CDX.first = function(d){
  var raw = typeof d === 'string' ? d : (d.raw || d.$ || d.prompt || '');
  var m = raw.match(/^codex(?:\s+--resume\s+(\S+))?\s*([\s\S]*)$/i);
  var text = m ? (m[2] || '') : raw;
  CDX.job = (typeof d === 'object' && d['#']) ? d['#'] : (CDX.job || '1');
  if(m && m[1]){ CDX.tid = m[1]; lab.textContent = CDX.tid.slice(0, 8) }
  text = text.trim();
  if(!text){ text = 'Help me with this codebase.' }
  CDX.user(text);
  CDX.send(text);
};

kit.ear('codex', function(eve){
  var d = eve.detail || eve.data || {};
  if(d.type === 'codex' || d['^']){ CDX.got(d); return }
  CDX.first(d);
});

ask.onsubmit = function(eve){
  var val = txt.value.trim();
  eve.preventDefault();
  if(!val || CDX.on){ return }
  CDX.out = null;
  CDX.user(val);
  CDX.send(val);
};

txt.oninput = CDX.fit;
txt.onkeydown = function(eve){
  if(eve.key === 'Enter' && !eve.shiftKey){
    eve.preventDefault();
    ask.requestSubmit();
  }
};

ins.onclick = function(){
  ins.classList.add('hide');
  CDX.out = null;
  CDX.send('', 'install');
};

stop.onclick = function(){
  CDX.send('', 'stop');
  CDX.done();
};

}());</script>
