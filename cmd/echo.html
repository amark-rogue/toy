<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div class="box">
  <pre id="out" class="out"></pre>
</div>
<style>
body { display: block; }
</style>
<script src="../util.js"></script>
<script>
kit.ear('echo', function hear(eve) {
  var s = (eve.detail || eve.data || '').flat().trim().split('\n');
  var text = s.slice(1).join('\n').trim();
  B.all('#out')[0].textContent = text || s[0].replace(/^echo\s+/,'') || ' ';
  hear.off();
});
</script>
