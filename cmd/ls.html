<style>
body { display: block; min-height: 0; overflow: hidden; }
.ls, list {
  text-align: center;
  display: block;
  scroll-padding-left: 50%;
  scroll-padding-right: 50%;
  width: 100%;
  max-height: max(90vh, 26em);
  column-width: 8em;
  column-gap: 0.01em;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0 0.2em; /* undo item bleed */
}
.ls a, list a, list tap {
  border: 1px solid var(--pop);
  border-radius: 0.6em;
  background: transparent;
  padding: 0.7em 0.6em;
  min-width: 3em;
  max-width: 9em;
  text-align: center;
  cursor: pointer;
  margin: 0 0.1em 0.2em 0.1em;
  
  font-weight: bold;
  user-select: none;
  display: inline-block;
  flex: 0 0 auto;
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-all;
  line-height: 0.9em;
  back-ground: color-mix(in srgb, var(--pop) 8%, transparent);
  font-fam-ily: 'Courier New', monospace;
}
.ls a:hover, .ls a:active, list a:hover, list a:active {
  background: var(--pop);
  color: var(--mood);
  transform: scale(0.9);
}
</style>
<script src="../util.js"></script>
<script>
kit.ear('ls',function hear(eve){ hear.off();
  //kit.up('', 'scroll');
  CMD.ls(eve.detail || eve.data, list);
});
  
// ls.html is always the first cmd loaded (auto-fired by chat.html),
// so it registers all belt shortcuts for cmd/*.html handlers.
kit.say(['ls','ls .'], 'belt');
//kit.say(['cat','cat '], 'belt');
//kit.say(['cd','cd '], 'belt');
kit.say(['pwd','pwd'], 'belt');
kit.say(['whoami','whoami'], 'belt');
kit.say(['ps','ps aux'], 'belt');
kit.say(['ping','ping '], 'belt');
kit.say(['grep','grep '], 'belt');
kit.say(['echo','echo '], 'belt');
kit.say(['mkdir','mkdir '], 'belt');
kit.say(['touch','touch '], 'belt');
//kit.say(['cp','cp '], 'belt');
//kit.say(['mv','mv '], 'belt');
//kit.say(['rm','rm '], 'belt');
kit.say(['clear','clear'], 'belt');
kit.say(['npm','npm '], 'belt');
kit.say(['git','git status'], 'belt');
kit.say(['claude','claude '], 'belt');
kit.say(['codex','codex '], 'belt');

CMD = {};
CMD.ls = function(s,v,f,cmd){
  cmd = (s=s.flat()).cut('\n',ESC); s = cmd[2]; cmd = cmd[0];
  
  s = s.replaceAll('\r\n','\t').replaceAll('\r','\t').replaceAll('\n','\t').replaceAll(/\s{2,}/g,'\t');
  f = (s.indexOf('\t')+1)? '\t' : /\s+/;
  s = s.split(f).sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));
  
  s.forEach((item,a)=>{
    if(!(item = item.flat().trim())){ return }
    (a = B.new('fit a')).where = item;
    a.file = (item.includes('.') && item !== '.' && item !== '..');
    a.textContent = item + (a.file? '' : '/');
    add.pin(a,-1);
  });

  v.scrollLeft = (v.scrollWidth - v.clientWidth) / 2;
};

B.ear('click',(eve, a)=>{ a = eve.target.closest('a');
  if(!a || !a.closest('list')){ return }
  if(!a.where){ return }
  kit.say({run:'cd '+a.where+' && ls .', cmd:'ls .', bin:'ls'}, 'prompt.same');
});

(async function(){ return;
  kit.say('ls .\nasdf\tqwertyuiop\thjkl\tzxcvbnmtyrueiwoqp1\tbnvm', 'ls');
}());
</script>
