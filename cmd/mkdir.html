<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div id="box" class="box">
  <div class="bar">
    <span id="lbl" class="tag">mkdir</span>
    <span id="fname" class="val"></span>
  </div>
</div>
<style>
body { display: block; min-height: 0; overflow: hidden; }
.err #lbl { color: var(--err); opacity: 1; }
.err #fname { color: var(--err); }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('mkdir', function hear(eve) {
  var s = (eve.detail || eve.data || '').flat().trim().split('\n');
  var out = s.slice(1).join('\n').trim();
  var name = s[0].replace(/^mkdir\s+(?:-p\s+)?/,'').trim();
  if(out && (out.toLowerCase().includes('exist') || out.toLowerCase().includes('denied'))) {
    box.tag('err', 1);
    B.all('#lbl')[0].textContent = 'error';
    B.all('#fname')[0].textContent = out.slice(0, 40);
  } else {
    B.all('#fname')[0].textContent = name;
  }
  box.onclick = function(){ kit.say('ls .','prompt') };
  hear.off();
});
</script>
