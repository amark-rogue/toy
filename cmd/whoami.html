<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<div id="box" class="box">
  <div class="bar">
    <span class="tag">user</span>
    <span id="user" class="val loud"></span>
  </div>
</div>
<style>
body { display: block; }
.loud { font-size: 1.4em; cursor: pointer; }
</style>
<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('whoami', function hear(eve) {
  var s = (eve.detail || eve.data || '').flat().trim().split('\n');
  var u = s.slice(1).join('\n').trim() || s[0].replace(/^whoami\s*/,'').trim() || 'unknown';
  B.all('#user')[0].textContent = u;
  box.onclick = function(){ kit.say('id', 'prompt.try') };
  hear.off();
});
</script>
