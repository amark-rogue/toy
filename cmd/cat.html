<link rel="stylesheet" href="../gun/kit/web.css">
<script src="../gun/kit/web.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<style>
  body, html {
    margin: 0;
    padding: 0;
    background: #000 !important;
    color: #f8f8f2;
    overflow-x: hidden;
  }
  .cat-container {
    padding: 1em 0.5em;
    background: #000;
  }
  pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1em;
    line-height: 1.5;
  }
  code {
    background: transparent !important;
    padding: 0 !important;
  }
  /* Override hljs background if any */
  .hljs {
    background: transparent !important;
    padding: 0 !important;
  }
</style>

<div class="cat-container">
  <pre><code id="content"></code></pre>
</div>

<script src="../util.js"></script>
<script>
console.off = 1;
kit.ear('cat', function hear(eve) {
  var s = eve.detail || eve.data || "";
  var raw = s.flat();
  var lines = raw.split('\n');
  var cmdLine = (lines[0] || "").trim();
  
  // Extract text and skip first line (the command)
  var text = lines.slice(1).join('\n');
  
  // Strip terminal prompts and trailing noise
  text = text.replace(/[\r\n]+.*(?:\$|#|>|PS>)\s*$/, '').trim();
  
  var codeEl = document.getElementById('content');
  codeEl.textContent = text;
  
  // Map common extensions to highlight.js language classes
  var langMap = {
    'js': 'javascript',
    'json': 'json',
    'html': 'xml',
    'css': 'css',
    'md': 'markdown',
    'py': 'python',
    'sh': 'bash',
    'yaml': 'yaml',
    'yml': 'yaml'
  };
  
  var fnameMatch = cmdLine.match(/cat\s+(.+)/);
  if (fnameMatch) {
    var fname = fnameMatch[1].replace(/["']/g, '');
    var ext = fname.split('.').pop().toLowerCase();
    if (langMap[ext]) {
      codeEl.className = 'language-' + langMap[ext];
    }
  }
  
  // Apply highlight
  try {
    hljs.highlightElement(codeEl);
  } catch(e) {
    console.error("Highlight error:", e);
  }
  
  hear.off();
  
  // Ensure the iframe fits the content height
  setTimeout(() => {
    kit.say({height: document.body.scrollHeight}, 'resize');
  }, 100);
});
</script>
