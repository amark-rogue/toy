<link rel="stylesheet" href="../gun/kit/web.css"><script src="../gun/kit/web.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<style>
body { display: block; min-height: 0; overflow: hidden; }
pre { margin: 0; white-space: pre-wrap; word-break: break-all; font-family: 'Courier New', monospace; line-height: 2.2em; counter-reset: line; }
code { outline: none; display: block; }
body, div, code, pre, span { display: unset; }
.hljs { background: transparent !important; }
.line { display: block !important; counter-increment: line; position: relative; }
.line::before { content: counter(line); vertical-align: middle; left: -0.1em; padding-right: 0.2em; color: var(--pop); user-select: none; font-size: 0.5em; opacity: 0.8; }
</style>
<pre><code id="content" contenteditable="true"></code></pre>
<script src="../util.js"></script>
<script>
kit.ear('cat', function hear(eve) {
  var s = eve.detail || eve.data || "";
  var raw = s.flat();
  var lines = raw.split('\n');
  var cmdLine = (lines[0] || "").trim();
  var text = lines.slice(1).join('\n');
  text = text.replace(/[\r\n]+.*(?:\$|#|>|PS>)\s*$/, '').trim();
  var codeEl = document.getElementById('content');
  var langMap = {
    js:'javascript', json:'json', html:'xml', css:'css',
    md:'markdown', py:'python', sh:'bash', yaml:'yaml', yml:'yaml'
  };
  var lang = null;
  var m = cmdLine.match(/cat\s+(.+)/);
  if(m) { lang = langMap[m[1].replace(/["']/g,'').split('.').pop().toLowerCase()]; }
  var highlighted;
  try {
    highlighted = lang ? hljs.highlight(text, {language: lang}).value : hljs.highlightAuto(text).value;
  } catch(e) {
    highlighted = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  codeEl.innerHTML = highlighted.split('\n').map(function(l) {
    return '<span class="line">' + (l || ' ') + '</span>';
  }).join('');
  hear.off();
});
</script>
