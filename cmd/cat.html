<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/monokai.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

<pre id="code"><code id="editor" contenteditable="true"></code></pre>

<style>
body { display: block; }
html, body { background:black; }
pre { 
  margin: 0; 
  font-family: 'Courier New', monospace; 
  line-height: 2.2em; 
  counter-reset: line;

  tab-size: 1;
  -moz-tab-size: 1;

  display: block;
  max-width: 100vw;
  max-height: 102dvh;
  overflow-y: auto;
  overflow-x: auto;
  trans-form: translateX(calc(var(--pan, 0) * -1px));
  transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
  will-change: transform;
}

code { outline: none; display: block; }
div, code, span { display: unset; }

.hljs { background: transparent !important; }
.line .content::before /*.line::after*/ { content: counter(line); vertical-align: top; padding: 0 0.1em; /*left: -0.1em; padding-right: 0.2em;*/ color: var(--pop); user-select: none; font-size: 0.5em; opacity: 0.8; }

.line { 
  display: block !important; 
  counter-increment: line; 
  position: relative; 
  white-space: nowrap;
}

.indent { 
  display: inline-block; 
  white-space: pre;
}
.line:active .indent { max-wi-dth: 0; } 
  
.line {

  transform-origin: left;
  /*view-timeline-inset: 50% 0%;*/
  animation: zoom ease both;
  animation-timeline: view();
  animation-range: entry 0% exit 100%;
}
.line:active .indent{ dis-play: none; } 

@keyframes zoom {
  0% {
    transform: scale(0.1) translateY(0%);
  } 65% {
    transform: scale(1) translateY(0);
  } 70% {
    transform: scale(1) translateY(0);
  } 100% {
    transform: scale(0.3) translateY(0%);
  }
}
.content {
  display: inline-block;
  width: 100vw;
  white-space: pre-wrap;

}
.number { } 

</style>
<script src="../util.js"></script>
<script>
kit.ear('cat', hear);
function hear(eve){ hear.off();
  var s = eve.detail || eve.data || "";
  var raw = s;
  var lines = raw.split(/\r?\n/);
  var cmd = (lines.shift() || "").trim();

  var text = lines.join('\n').replace(/[\r\n]+.*(?:\$|#|>|PS>)\s*$/, '').trim();
  var langs = {js:'javascript', json:'json', html:'xml', css:'css',md:'markdown', py:'python', sh:'bash', yaml:'yaml', yml:'yaml'};
  var lang = null;
  var m = cmd.match(/cat\s+(.+)/);
  if(m){ lang = langs[m[1].replace(/["']/g,'').split('.').pop().toLowerCase()]; }

  var highlighted;
  try{ highlighted = lang ? hljs.highlight(text, {language: lang}).value : hljs.highlightAuto(text).value;
  }catch(e){ highlighted = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  var was;
  editor.innerHTML = highlighted.split('\n').map(function(l){ l = trims(l);
    return '<span class="line"><span class="indent">'+(l[0]||'')+'</span><span class="content">'+(l[1]||'')+'</span></span>';
  }).join('');
};
function trims(l) { return (i = l.search(/\S/)) === -1 ? [l,''] : [l.slice(0,i), l.slice(i)] }

function pan(){ setTimeout(pan,99); return;
  var el = document.elementFromPoint(1, window.innerHeight / 2), line;
  if(!(line = el && el.closest('.line'))){ return }
  var indent = pan.out(line);
  if(pan.was === indent){ return }
  document.body.style.setProperty('--pan', pan.was = indent || 0);
};
pan.at = function(el){ return el?.querySelector('.indent')?.textContent?.length || 0 }
pan.out = function(el){
  var now = pan.at(el)||1, was, i = 99;
  while(--i && (was = pan.at(el = el.previousSibling)) >= now){}
  if(!el){ return 0 }
  el = el.querySelector('.content');
  return el ? el.offsetLeft : 0;
}
setTimeout(pan, 1);
//window.onkeyup = function(){ hear({detail:'cat "cat.html"\n'+editor.textContent}); }


(async function() { //return;
  var t = await (await fetch("https://cdn.jsdelivr.net/gh/amark/gun@master/kit/web.js")).text();
  
  kit.say('cat "cat.js"\n'+(t|| document.body.parentNode.innerHTML) , 'cat');
 } ()) ;
</script>
