<script src="util.js"></script>
<script>;(function(shell){ shell();
var root = document.body.all('shell')[0];
var task = root.all('task')[0];
var model = task.cloneNode(1);
(shell.$ = task.all('prompt')[0]).focus();

kit.ear('chat',(eve)=>{ var d = eve.detail || eve.data || '';
  if('{'==d[0]){ try{

  }catch(e){}}
  //stream(d);
  CMD.stream(d);
});

document.body.ear('keydown',function(eve){
  if(!eve.target.matches('prompt')){ return }
  shell.$ = eve.target;
  if('enter' == eve.key.toLowerCase() && !eve.shiftKey){
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
  CMD.help(eve);
});
kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  cmd = cmd || shell.$.textContent;
  cmd = (cmd || '').trim();
  if(!cmd){ text(shell.$, ''); return }
  text(shell.$, cmd);
  //shell.$.removeAttribute('contenteditable');
  CMD.live = shell.$.up('task');
  kit.say(cmd+'\r','host');
  screen.buzz();
});

var CMD = {};
CMD.raw = '';
CMD.stream = function(raw){
  var clean, part, done, i;
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(raw, {state: CMD, send: function(c){ kit.say(c, 'host') }});
  CMD.raw += raw || '';
  clean = (window.shellReply || {}).clean ? window.shellReply.clean(CMD.raw) : CMD.raw;
  part = (String.prototype.splitPrompts ? clean.splitPrompts() : String.prompts(clean));
  if(part.length > 1){
    done = part.slice(0, -1);
    CMD.raw = part[part.length - 1];
    for(i = 0; i < done.length; i += 1){ CMD.bash(done[i]) }
  }
  if(CMD.live){ text(CMD.live.all('raw')[0], ((window.shellReply || {}).clean ? window.shellReply.clean(CMD.raw) : CMD.raw).flat()) }
}
CMD.head = function(raw, flat, line, hit, cmd){
  flat = (raw || '').flat();
  line = flat.split(/\r\n|\n|\r/)[0] || '';
  hit = line.match(/^(.*?)(\$|#|>|%|~%|PS>)\s*([\s\S]*)$/);
  cmd = hit ? hit[3].trim() : line.trim();
  return {
    path: hit ? hit[1].trim() : '',
    sign: hit ? hit[2].trim() : '$',
    line: line,
    cmd: cmd,
    bin: (cmd.split(/\s+/)[0] || '').trim()
  };
}
CMD.bash = function(raw, t, h, r, i){
  h = CMD.head(raw);
  if(!h.cmd){ return }
  t = CMD.live || fresh();
  CMD.live = null;
  text(t.all('symbol')[0], h.sign + ' ');
  text(t.all('prompt')[0], h.cmd);
  t.all('prompt')[0].removeAttribute('contenteditable');
  r = t.all('raw')[0];
  text(r, (raw || '').flat());
  if(!t.parentNode){ root.append(t) }
  if(h.bin){
    i = t.all('iframe')[0];
    i.onload = function(){
      if(!i.readyState){ return i.remove() }
      kit.say(raw, h.bin, i);
      r.remove();
    };
    i.src = './cmd/' + h.bin + '.html';
  }
  next();
}
CMD.help = function(eve){ var $ = shell.$;
  if(CMD.help.wait){ clearTimeout(CMD.help.wait) }
  CMD.help.wait = setTimeout(async function(){try{
    ask = $.textContent;
    var answer = await AI.ask("1 sentence reply for terminal shell or code help:" + ask);
    var doc = new DOMParser().parseFromString(answer, 'text/html');
    var v = doc.querySelector('.a') || doc.body;
    $.up().all('help')[0].textContent = v.textContent;
  }catch(e){}},99+(Math.random()*250));
}

function text(v, s){
  v.textContent = s || '';
  if(!s){ v.append(document.createElement('br')) }
  return v;
}

function fresh(t){
  t = model.cloneNode(1);
  text(t.all('symbol')[0], '$ ');
  text(t.all('prompt')[0], '');
  t.all('prompt')[0].setAttribute('contenteditable', 'true');
  text(t.all('help')[0], ' ');
  text(t.all('raw')[0], '');
  t.all('iframe')[0].removeAttribute('src');
  return t;
}

function next(t){
  if((root.lastElementChild || {}).all && root.lastElementChild.all('prompt[contenteditable=true]')[0]){ return }
  t = fresh();
  root.append(t);
  shell.$ = t.all('prompt')[0];
  shell.$.focus();
}

document.body.ear('click', function(eve, b){
  b = eve.target.closest('kit button');
  if(!b){ return }
  kit.say(b.textContent, 'prompt');
});

kit.ear('clear',eve=>{ root.innerHTML = ""; next(); });

}(window.shell = function(){

}));
</script>
