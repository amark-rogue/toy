<style>
:root { --fill: var(--mood); --font: 'Courier New', monospace; }
body { display: block; background: var(--fill); }
shell {
  width: 100%;
  font: var(--font);
  font-size: var(--cs);
  color: var(--pop);
}
task {
  margin: 1em 0;
}
symbol {
  display: inline;
  float: left;
  white-space: pre-wrap;
}
prompt {
  display: block;
  width: 100%;
  min-height: 1em;
  caret-shape: block;
  white-space: pre-wrap;
}
help {
  filter: hue-rotate(220deg) brightness(2);
  touch-action: manipulation;
}
fit { display: none; }
::selection { background: var(--pop); color: var(--fill); }
fit { display: none; }

iframe {
  height: 0;
  width: 100%;
  max-hei-ght: calc(100dvh - 3em - 3em);
  transition: height 120ms ease;
}
iframe.shut {
  height: 0 !important;
}

</style>
<script src="util.js"></script>
<script>;(function(shell){
var root = shell.all('shell')[0];
var task = root.all('task')[0];
var model = task.cloneNode(1);
shell.seq = 0;
(shell.$ = task.all('prompt')[0]).focus();

kit.ear('chat',(eve, raw)=>{ raw = eve.detail || eve.data || eve;
  if('{'==raw[0]){ try{ if(shell.hook(JSON.parse(raw))){ return } }catch(e){}}
  shell.stream(raw);
});

shell.ear('keydown',function(eve){
  if(!eve.target.matches('prompt')){ return }
  shell.$ = eve.target;
  if('enter' == eve.key.toLowerCase() && !eve.shiftKey){
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
});
kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  cmd = (cmd || shell.$.textContent || '').trim();
  shell.$.textContent = cmd;
  //shell.$.removeAttribute('contenteditable');
  shell.live = shell.$.up('task')[0];
  if(/^codex\b/i.test(cmd)){
    shell.bash('$ ' + cmd + '\n');
    screen.buzz();
    return;
  }
  kit.say(cmd+'\r','host');
  screen.buzz();
});
kit.ear('prompt.same',(eve)=>{
  var msg = eve.detail||eve.data||{};
  console.log('prompt.same:', msg);
  var cmd = (msg.run || msg.cmd || msg).trim();
  var t = (eve.target && eve.target.up) ? eve.target.up('task')[0] : null;
  if(!cmd || !t){ return }
  t.bin = msg.bin || '';
  t.cmd = msg.cmd || cmd;
  shell.live = t;
  kit.say(cmd+'\r','host');
  screen.buzz();
});

shell.raw = '';
shell.stream = function(raw){
  var clean, part, done, i;
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(raw, {state: shell, send: function(c){ kit.say(c, 'host') }});
  shell.raw += raw || '';
  clean = (window.shellReply || {}).clean ? window.shellReply.clean(shell.raw) : shell.raw;
  part = (String.prototype.splitPrompts ? clean.splitPrompts() : String.prompts(clean));
  if(part.length > 1){
    done = part.slice(0, -1);
    shell.raw = part[part.length - 1];
    for(i = 0; i < done.length; i += 1){ shell.bash(done[i]) }
  }
  if(shell.live && shell.live.all){ text(out(shell.live), ((window.shellReply || {}).clean ? window.shellReply.clean(shell.raw) : shell.raw).flat()) }
}
shell.head = function(raw, flat, line, hit, cmd){
  flat = (raw || '').flat();
  line = flat.split(/\r\n|\n|\r/)[0] || '';
  hit = line.match(/^(.*?)(\$|#|>|%|~%|PS>)\s*([\s\S]*)$/);
  cmd = hit ? hit[3].trim() : line.trim();
  return {
    path: hit ? hit[1].trim() : '',
    sign: hit ? hit[2].trim() : '$',
    line: line,
    cmd: cmd,
    bin: (cmd.split(/\s+/)[0] || '').trim()
  };
}
shell.bash = function(raw, t, h, r, i, old, src){
  h = shell.head(raw);
  if(!h.cmd){ return }
  t = shell.live || fresh();
  t.job || (t.job = '' + (++shell.seq));
  t.setAttribute('job', t.job);
  shell.live = null;
  h.bin = t.bin || h.bin;
  h.cmd = t.cmd || h.cmd;
  t.bin = '';
  t.cmd = '';
  text(t.all('symbol')[0], h.sign + ' ');
  text(t.all('prompt')[0], h.cmd);
  t.all('prompt')[0].removeAttribute('contenteditable');
  r = out(t);
  text(r, (raw || '').flat());
  if(!t.parentNode){ root.append(t) }
  if(h.bin){
    old = t.all('iframe:not(.shut)')[0] || t.all('iframe')[0];
    i = old;
    src = './cmd/' + h.bin + '.html';
    if(old && old.getAttribute('src')){
      i = old.cloneNode(0);
      old.parentNode.insertBefore(i, old.nextSibling);
      old.classList.add('shut');
      setTimeout(function(){
        if(old.parentNode){ old.remove() }
      }, 140);
    }
    i.onload = function(){
      if(!i.readyState){ return i.remove() }
      i.classList.remove('shut');
      kit.say(h.bin === 'codex' ? {$: h.cmd, raw: h.cmd, '#': t.job} : raw, h.bin, i);
      r.remove();
    };
    i.src = src;
  }
  next();
}

shell.hook = function(obj, t, i){
  if(!obj || !obj['#']){ return 0 }
  t = root.querySelector('task[job="' + String(obj['#']).replace(/"/g, '') + '"]');
  if(!t){ return 0 }
  i = t.all('iframe:not(.shut)')[0] || t.all('iframe')[0];
  if(!i){ return 0 }
  kit.say(obj, 'codex', i);
  return 1;
}

function text(v, s){
  v.textContent = s || '';
  if(!s){ v.append(document.createElement('br')) }
  return v;
}

function out(t, r, i){
  r = t.all('raw')[0];
  if(r){ return r }
  r = model.all('raw')[0].cloneNode(1);
  i = t.all('iframe:not(.shut)')[0] || t.all('iframe')[0];
  if(i && i.parentNode){ i.parentNode.insertBefore(r, i) }
  else { t.append(r) }
  return r;
}

function fresh(t){
  t = model.cloneNode(1);
  t.job = '' + (++shell.seq);
  t.setAttribute('job', t.job);
  text(t.all('symbol')[0], '$ ');
  text(t.all('prompt')[0], '');
  t.all('prompt')[0].setAttribute('contenteditable', 'true');
  text(t.all('help')[0], ' ');
  t.all('help')[0].cmd = '';
  text(t.all('raw')[0], '');
  t.all('iframe')[0].removeAttribute('src');
  return t;
}

function next(t){
  if((root.lastElementChild || {}).all && root.lastElementChild.all('prompt[contenteditable=true]')[0]){ return }
  t = fresh();
  root.append(t);
  shell.$ = t.all('prompt')[0];
  //shell.$.focus();
}

//kit.ear('clear',eve=>{ root.innerHTML = ""; next(); });

}(window.shell = document.body));
</script>
