<style>
:root { --fill: var(--mood); --font: 'Courier New', monospace; }
html,
body {
  scroll-timeline-name: --top;
  scroll-timeline-axis: block;
}
body { display: block; background: var(--fill); }
shell {
  width: 100%;
  font: var(--font);
  font-size: var(--cs);
  color: var(--pop);
}
task {
  margin: 1em 0;
}
symbol {
  display: inline;
  float: left;
  white-space: pre-wrap;
}
prompt {
  display: block;
  width: 100%;
  min-height: 1em;
  caret-shape: block;
  white-space: pre-wrap;
}
help {
  filter: hue-rotate(220deg) brightness(2);
  touch-action: manipulation;
}
fit { display: none; }
::selection { background: var(--pop); color: var(--fill); }
fit { display: none; }

iframe {
  height: 0;
  width: 100%;
}

body::before {
  content: "";
  position: fixed;
  top: -5em;
  left: 0;
  right: 0;
  height: 7em;
  background: var(--fill);
  -webkit-mask-image: linear-gradient(to bottom, #000 0%, transparent 100%);
  mask-image: linear-gradient(to bottom, #000 0%, transparent 100%);
  z-index: 99;
  pointer-events: none;
  animation: veil linear both;
  animation-timeline: --top;
  animation-range: 0 7em;
}

body::after {
  content: "";
  position: fixed;
  bottom: -7em;
  left: 0;
  right: 0;
  height: 7em;
  background: var(--fill);
  -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 100%);
  mask-image: linear-gradient(to top, #000 0%, transparent 100%);
  z-index: 99;
  pointer-events: none;
  animation: foot linear both reverse;
  animation-timeline: --top;
  animation-range: calc(100% - 7em) 100%;
}

@keyframes veil {
  to { top: 0; }
}

@keyframes foot {
  to { bottom: 0; }
}

</style>
<script src="util.js"></script>
<script>;(function(shell){
var root = shell.all('shell')[0];
var task = root.all('task')[0];
var model = task.cloneNode(1);
(shell.$ = task.all('prompt')[0]).focus();

kit.ear('chat',(eve, raw)=>{ raw = eve.detail || eve.data || eve;
  if('{'==raw[0]){ try{ }catch(e){}}
  shell.stream(raw);
});

shell.ear('keydown',function(eve){
  if(!eve.target.matches('prompt')){ return }
  shell.$ = eve.target;
  if('enter' == eve.key.toLowerCase() && !eve.shiftKey){
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
});
kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  cmd = (cmd || shell.$.textContent || '').trim();
  shell.$.textContent = cmd;
  //shell.$.removeAttribute('contenteditable');
  shell.live = shell.$.up('task')[0];
  kit.say(cmd+'\r','host');
  screen.buzz();
});

shell.raw = '';
shell.stream = function(raw){
  var clean, part, done, i;
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(raw, {state: shell, send: function(c){ kit.say(c, 'host') }});
  shell.raw += raw || '';
  clean = (window.shellReply || {}).clean ? window.shellReply.clean(shell.raw) : shell.raw;
  part = (String.prototype.splitPrompts ? clean.splitPrompts() : String.prompts(clean));
  if(part.length > 1){
    done = part.slice(0, -1);
    shell.raw = part[part.length - 1];
    for(i = 0; i < done.length; i += 1){ shell.bash(done[i]) }
  }
  if(shell.live && shell.live.all){ text(shell.live.all('raw')[0], ((window.shellReply || {}).clean ? window.shellReply.clean(shell.raw) : shell.raw).flat()) }
}
shell.head = function(raw, flat, line, hit, cmd){
  flat = (raw || '').flat();
  line = flat.split(/\r\n|\n|\r/)[0] || '';
  hit = line.match(/^(.*?)(\$|#|>|%|~%|PS>)\s*([\s\S]*)$/);
  cmd = hit ? hit[3].trim() : line.trim();
  return {
    path: hit ? hit[1].trim() : '',
    sign: hit ? hit[2].trim() : '$',
    line: line,
    cmd: cmd,
    bin: (cmd.split(/\s+/)[0] || '').trim()
  };
}
shell.bash = function(raw, t, h, r, i){
  h = shell.head(raw);
  if(!h.cmd){ return }
  t = shell.live || fresh();
  shell.live = null;
  text(t.all('symbol')[0], h.sign + ' ');
  text(t.all('prompt')[0], h.cmd);
  t.all('prompt')[0].removeAttribute('contenteditable');
  r = t.all('raw')[0];
  text(r, (raw || '').flat());
  if(!t.parentNode){ root.append(t) }
  if(h.bin){
    i = t.all('iframe')[0];
    i.onload = function(){
      if(!i.readyState){ return i.remove() }
      kit.say(raw, h.bin, i);
      r.remove();
    };
    i.src = './cmd/' + h.bin + '.html';
  }
  next();
}

function text(v, s){
  v.textContent = s || '';
  if(!s){ v.append(document.createElement('br')) }
  return v;
}

function fresh(t){
  t = model.cloneNode(1);
  text(t.all('symbol')[0], '$ ');
  text(t.all('prompt')[0], '');
  t.all('prompt')[0].setAttribute('contenteditable', 'true');
  text(t.all('help')[0], ' ');
  t.all('help')[0].cmd = '';
  text(t.all('raw')[0], '');
  t.all('iframe')[0].removeAttribute('src');
  return t;
}

function next(t){
  if((root.lastElementChild || {}).all && root.lastElementChild.all('prompt[contenteditable=true]')[0]){ return }
  t = fresh();
  root.append(t);
  shell.$ = t.all('prompt')[0];
  //shell.$.focus();
}

//kit.ear('clear',eve=>{ root.innerHTML = ""; next(); });

}(window.shell = document.body));
</script>
