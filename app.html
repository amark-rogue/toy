<form id="sign" onsubmit="cop.sign()">
  <input id="host" name="host" placeholder="host:" class="fog sap lip">
  <input id="pass" name="pass" type="password" placeholder="pass:" class="fog sap lip">
  <button type="submit"></button>
</form>

<style>
:root { --fill: var(--mood); }
#sign { flex-shrink: 0; }
iframe { width: 100%; flex: 1; min-height: 0; height: 0 !important; border: none; display: block; }
input::placeholder { opacity: 1; }
</style>

<script src="util.js"></script>
<script>;(function(cop){

location.hash = '';
host.focus();
console.off=1;

cop.sign = async ()=>{ if(cop.ws){ return }
  cop.ws = new WebSocket((localStorage.host=host.value).replace(/^http/,'ws')||'ws://localhost:8022');
  cop.ws.onopen = ()=>{ cop.ws.send(localStorage.pass=pass.value);
    location.path = 'shell.html';
  };
  cop.ws.onmessage = (eve) => { kit.say(eve.data,'chat') };
  cop.ws.onerror = (err) => { console.error('ws err:', err) };
  cop.ws.onclose = (eve) => { cop.ws=0; kit.say('Reconnecting...\n', 'chat');
    setTimeout(() => { cop.wait = Math.min(cop.wait * 2, 30000); cop.sign() }, cop.wait = cop.wait || 1000);
  };
  cop.ws.onopen = ((fn) => () => { cop.wait = 1000; fn() })(cop.ws.onopen);
};

(pass.value = localStorage.pass||'') && cop.sign();

kit.ear('host',(eve,cmd,no)=>{
  if(no === (cmd = eve.detail||eve.data)){ return }
  var msg = (typeof cmd === 'string') ? cmd : JSON.stringify(cmd);
  if(!cop.ws){ (cop.limbo = cop.limbo||[]).push(msg); return }
  cop.ws.send(msg);
});

}(window.cop = {}));
</script>
