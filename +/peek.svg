<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Code on Phone square social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030005"/>
      <stop offset="45%" stop-color="#14061e"/>
      <stop offset="100%" stop-color="#080010"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.75" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.1" cy="0.92" r="0.65">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="1" y2="1">
