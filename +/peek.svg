    <text x="0" y="110" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="98" font-weight="800">Ship from</text>
    <text x="0" y="208" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="98" font-weight="800">anywhere.</text>
    <text x="0" y="280" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="38">$999 per seat</text>
  </g>

  <g transform="translate(610,360)">
