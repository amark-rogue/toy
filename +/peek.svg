    <rect x="124" y="0" width="112" height="26" fill="#07010d"/>
    <rect x="34" y="72" width="292" height="432" rx="20" fill="#0b0512" stroke="#2a1235" stroke-width="1"/>
    <text x="54" y="118" fill="#5b4a67" font-family="Courier New, monospace" font-size="15">// remote mode</text>
    <text x="54" y="156" fill="#d946ef" font-family="Courier New, monospace" font-size="18">if</text>
    <text x="76" y="156" fill="#ffffff" font-family="Courier New, monospace" font-size="18"> productivity &lt; goal {</text>
    <text x="54" y="188" fill="#ffffff" font-family="Courier New, monospace" font-size="18">  assign_work("MOBILE")</text>
    <text x="54" y="220" fill="#ffffff" font-family="Courier New, monospace" font-size="18">}</text>
    <rect x="34" y="530" width="292" height="56" rx="14" fill="#13081a" stroke="#5f2575" stroke-width="1"/>
    <text x="180" y="566" text-anchor="middle" fill="#d946ef" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">DEPLOY</text>
