<script>;(function(chat){ chat();
var prompt;
var shell = B.all('#shell')[0];
var help = B.all('#help')[0];
var scrollBtn = B.all('#scroll')[0];
var belt = B.all('.kit .tin')[0];
// --- agent mode (claude / codex) ---
var agent = {mode:'', iframe:null, sid:null, kind:''};

var agentEnter = function(iframe, kind){
  agent.iframe = iframe;
  agent.mode = kind;
  agent.kind = kind;
  help.style.opacity = '1';
  prompt.placeholder = kind + '>';
};
var agentExit = function(){
  agent.mode = '';
  agent.iframe = null;
  help.textContent = '';
  help.style.opacity = '';
  prompt.placeholder = '$';
};

// cwd is tracked by watching pwd output and cd commands in CMD.bash
var ais = ['claude','codex','gemini'];
ais.forEach(function(k){ kit.ear(k+'-session', function(eve){ if(agent.kind===k) agent.sid = eve.detail||eve.data||null }) });
var parse = function(val){
  var m = val.match(/^(claude|codex|gemini)(?:\s+--resume\s+(\S+))?\s*([\s\S]*)$/i);
  if(!m) return null;
  return {kind: m[1].toLowerCase(), sid: m[2]||null, prompt: m[3].trim()||m[1]};
};
var sidKey = function(kind){ return kind === 'codex'? 'thread' : 'session' };

var card = function(val, kind, sid){
  var v = B.new('div'), p = B.new('pre'), i = B.new('iframe');
  v.className = 'reply-card '+kind+'-card';
  p.textContent = '$ '+val;
  v.append(p);
  i.src = './cmd/'+kind+'.html';
  shell.append(v);
  var sent;
  i.onload = function(e){
    if(!i.readyState){ return i.remove() }
    if(sent) return;
    sent = 1;
    var msg = {prompt:val, cwd:(localStorage.cwd || '')};
    if(sid) msg[sidKey(kind)] = sid;
    kit.say(msg, kind, i);
    agentEnter(i, kind);
  };
  v.append(i);
  p.style.cursor = 'pointer';
  p.onclick = function(){
    if(agent.mode && agent.iframe === i) return;
    agentEnter(i, kind);
    go();
  };
  go();
};
var mod = {};
(prompt = B.all('#prompt')[0]).focus();

var low = function(){
  var gap = 50;
  return (B.scrollHeight - B.scrollTop - B.clientHeight < gap) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < gap);
};
window.go = function(){
  B.scrollTop = B.scrollHeight;
  shell.scrollTop = shell.scrollHeight;
};
var tip = function(){

  }

kit.ear('chat',(eve)=>{ var d = eve.detail || eve.data || '';
  if('{'==d[0]){ try{
    var j = ('string' == typeof d) ? JSON.parse(d) : d;
    if(j.type && agent.iframe){
      for(var ai=0; ai<ais.length; ai++){ if(j.type.indexOf(ais[ai]) === 0){ kit.say(j, ais[ai], agent.iframe); return } }
    }

kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  if(cmd){
    prompt.value = cmd;
    autoGrow(prompt);
  }
  var val = prompt.value.trim();
  if(!val){
    prompt.value = '';
    autoGrow(prompt);
    return;
  }

  // exit agent mode
  if(agent.mode && /^exit$/i.test(val)){
    agentExit();
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    return;
  }

  // in agent mode, send follow-up
  if(agent.mode && agent.iframe && val){
    var msg = {prompt:val, cwd:(localStorage.cwd || '')};
    msg[sidKey(agent.kind)] = agent.sid;
    kit.say(msg, agent.kind, agent.iframe);
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    go();
    return;
  }

  // start or resume agent session
  var cmd = parse(val);
  if(cmd){
    agent.sid = cmd.sid || null;
    card(val, cmd.kind, cmd.sid);
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    return;
  }

  // open PORT[/path] — serial proxy browser
  var om = val.match(/^open\s+(\d+)(\/\S*)?$/);
  if(om){
    var ov = B.new('div'), op = B.new('pre'), oi = B.new('iframe');
    ov.className = 'reply-card open-card';
    op.textContent = '$ ' + val;
    ov.append(op);
    oi.src = './cmd/open.html';
    shell.append(ov);
    var osent;
    oi.onload = function(){
      if(!oi.readyState){ return oi.remove() }
      if(osent) return;
      osent = 1;
      kit.say({port: om[1], path: om[2] || '/'}, 'open', oi);
    };
    ov.append(oi);
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    go();
    return;
  }

  kit.say(prompt.value+'\r','host');
  prompt.value = "";
  autoGrow(prompt);
  window.buzz();
  go();
});

kit.ear('prompt.try',(eve)=>{
  prompt.value = eve.detail||eve.data;
  autoGrow(prompt);
  prompt.focus();
  prompt.setSelectionRange(prompt.value.length, prompt.value.length);
});

var put = function(txt, a, z, s){
  prompt.focus();
  a = prompt.selectionStart || 0;
  z = prompt.selectionEnd || 0;
  s = prompt.value;
  prompt.value = s.slice(0, a) + txt + s.slice(z);
  a += txt.length;
  prompt.setSelectionRange(a, a);
  autoGrow(prompt);
};

var helpSay = function(txt){
  if(help.wait){ clearTimeout(help.wait); }
  if(help.gone){ clearTimeout(help.gone); }
  help.classList.remove('off');
  help.textContent = txt || '';
  if(!txt){ return; }
  help.wait = setTimeout(function(){
    help.classList.add('off');
  }, 1800);
  help.gone = setTimeout(function(){
    help.textContent = '';
    help.classList.remove('off');
  }, 4300);
};

var ctrl = function(key, code){
  if(!key || key.length !== 1){ return ''; }
  code = key.toUpperCase().charCodeAt(0);
  if(code >= 65 && code <= 90){ return String.fromCharCode(code - 64); }
  if(code >= 91 && code <= 95){ return String.fromCharCode(code - 64); }
  if(code === 54){ return String.fromCharCode(30); }
  if(code === 191){ return String.fromCharCode(31); }
  return '';
};

var keyUi = function(){
  var on = B.all('#ctrl')[0];
  if(on){ on.classList[mod.ctrl ? 'add' : 'remove']('live'); }
};

var tapKey = function(name){
  if(name === 'esc'){ put('\u001b'); return; }
  if(name === 'tab'){ put('\t'); return; }
  if(name === 'alt'){ put('\u001b'); return; }
  if(name === 'cmd'){ put('\u001b'); return; }
  if(name === 'ctrl'){
    mod.ctrl = !mod.ctrl;
    keyUi();
  }
};

var history = [], hi=1;
prompt.onkeydown = function(eve){
  var ch;
  if(mod.ctrl && eve.key && eve.key.length === 1 && !eve.altKey && !eve.metaKey){
    ch = ctrl(eve.key);
    if(ch){
      eve.preventDefault();
      put(ch);
      mod.ctrl = 0;
      keyUi();
      return;
    }
  }
  if (eve.key === 'Enter' && !eve.shiftKey) {
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
  if(eve.key === 'ArrowUp') {
    if(hi > 0) { hi--; prompt.value = history[hi]; autoGrow(prompt); }
    eve.preventDefault();
  } else if (eve.key === 'ArrowDown') {
    if(hi < history.length - 1) { hi++; prompt.value = history[hi]; }
    else { hi = history.length; prompt.value = ''; }
    autoGrow(prompt);
    eve.preventDefault();
  }
};
            
kit.ear('belt', function(eve, data, b){

  var name = data.name||data[0];

  b = B.new('button');

  b.onclick = function(){
    if(data.key){ tapKey(name); return; }
    kit.say(data.prompt||data[1], 'prompt');
  };
  belt.append(b);
});

const autoGrow = (textarea) => {
  textarea.style.height = 'auto';
  textarea.style.height = (textarea.scrollHeight) + 'px';
  // Fix for mobile browser URL bar hiding the prompt
  setTimeout(() => {
    window.scrollTo(0, document.body.scrollHeight);
  }, 100);
};

prompt.onfocus = function(eve){
  autoGrow(prompt);
};

autoGrow(prompt);

window.addEventListener('scroll', function() {
  if(low() && scrollBtn) {
    scrollBtn.classList.remove('show');
  }
}, true);
scrollBtn.onclick = function(){ go(); scrollBtn.classList.remove('show'); };

B.all('#help')[0].ear('click',function(eve){
  if(!prompt.try){ return }
  eve.preventDefault();
  kit.say(prompt.try, 'prompt.try');
});
var stream = function(t){
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(t, {state: stream, send: function(c){ kit.say(c, 'host') }});
  stream.live || (stream.live = (function(card, pre){
    card = B.new('div');
    pre = B.new('pre');
    card.append(pre);
    card.pre = pre;
    card.raw = '';
    shell.append(card);
    return card;
  }()));
  var isRefresh = t.includes('\x1b[H') || t.includes('\x1b[2J') || t.includes('\x1b[J');
  if(isRefresh){
    stream.live.raw = t;
  } else {
    stream.live.raw += t;
  }
  var cleaned = (window.shellReply || {}).clean ? window.shellReply.clean(stream.live.raw) : stream.live.raw;
  stream.live.pre.textContent = cleaned.flat();
  stream.last = (window.shellReply || {}).clean ? window.shellReply.clean((isRefresh ? '' : (stream.last||''))+t) : ((isRefresh ? '' : (stream.last||''))+t);
  tip();
  (stream.eat || CMD.bash)(stream.last);
}, CMD = {};

;(function(){
var F = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>','%','~%'];
stream.eat = function(s){
  var f = s.cut(F,ESC);
  if(!f[1]){ /*setTimeout(t=>{if(F.forEach){shell.append("cannot find prompt. custom shell being used?")}});*/ return }
  F = f[1];
  f = f[0].split('\r\n').slice(-1)[0]; // make more unique?
  F = f+F;
  //console.log("prompt:", [F]);
  (stream.eat = CMD.bash)(s);
}
CMD.bash = function(S, cmdl, cmd, tmp){
  var arr = S.split(F);
  var usedF = F;

  if(arr[arr.length-1].flat().trim()){ 
    var P = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>','%','~%'];
    if(P.some(c => S.flat().replace(/\s+$/, '').endsWith(c))){
      var lines = S.split('\n'), lastL = lines[lines.length-1];
      var newF = lastL.cut(P, ESC);
      if(newF[1]){
        var nextF = newF[0].split('\r').slice(-1)[0] + newF[1];
        S = S.split(F).join(nextF);
        F = nextF;
        arr = S.split(F);
      } else return;
    } else return;
  }
  S = arr;
  stream.last = '';
  if(stream.live){
    stream.live.remove();
    stream.live = null;
  }
  var atBottom = (B.scrollHeight - B.scrollTop - B.clientHeight < 50) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < 50);
  var oldF = usedF;
  var firstChunk = true;
  S.forEach(function(s,i){
    var v,t,p;
    if(!(t = s.flat()).trim()){ return }
    // track cwd from pwd output and cd commands
    var lines = t.split(/[\r\n]+/);
    var cmdLine = lines[0].replace(/^.*(?:\$|#|>|PS>)\s*/,'').trim();
    if(/^pwd\b/.test(cmdLine)){
      // pwd output is the last non-empty line before prompt
      for(var li = lines.length-1; li >= 1; li--){
        var ln = lines[li].trim();
        if(ln && ln.charAt(0) === '/'){ localStorage.cwd = ln; break; }
      }
    }
    var cmdFull = t.cut(['\r\n','\n','\r'],ESC)[0].trim().replace(/^.*(?:\$|#|>|PS>)\s*/, '');
    var cmd = cmdFull.trim().split(/\s+/)[0].trim();

    (v = B.new('div'));
    v.raw = s;

    var promptToUse = firstChunk ? oldF : F;
    firstChunk = false;
    var promptText = (Array.isArray(promptToUse) ? '$' : (promptToUse.flat ? promptToUse.flat() : promptToUse)).trim();
    var match = promptText.match(/^(.*?)([\$#>\%]\s*|\~%\s*)$/s);
    var symPart = '';
    if (match) {
       var pathPart = match[1].trim();
       symPart = match[2].trim();
       var colonIdx = pathPart.lastIndexOf(':');
       var pathOnly = colonIdx !== -1 ? pathPart.substring(colonIdx + 1) : pathPart;
       var prefix = colonIdx !== -1 ? pathPart.substring(0, colonIdx + 1) : "";
       var parts = pathOnly.split('/');
       if (parts.length > 4) {
         pathOnly = parts.slice(0, 2).join('/') + '/.../' + parts.slice(-2).join('/');
       }
       promptText = prefix + pathOnly ;
    }

    (p = B.new('p')).innerText = promptText;
    v.append(p);
    (p = B.new('p')).innerText = symPart+' '+cmdFull;
    v.append(p);

    (p = B.new('pre')).textContent = t;
    v.append(p);

    if(cmd){
      v.append(i = B.new('iframe'));
      i.onload = function(e){
        if(!i.readyState){ return i.remove() }
        kit.say(s, cmd, i);
        p.remove();
      }; i.src = './cmd/'+cmd+'.html';
    }
    shell.append(v);
  });
  tip();
}
}());
