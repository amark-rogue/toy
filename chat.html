  prompt.value = eve.detail||eve.data;
  //prompt.focus(); prompt.select();
});
prompt.onkeydown = function(eve){
  if(eve.key === 'ArrowUp') {
    if(histIndex > 0) { histIndex--; prompt.value = history[histIndex]; }
    eve.preventDefault();
  } else if (eve.key === 'ArrowDown') {
    if(histIndex < history.length - 1) { histIndex++; prompt.value = history[histIndex]; }
    else { histIndex = history.length; prompt.value = ''; }
    eve.preventDefault();
  } else if (eve.key === 'Enter' && !eve.shiftKey) {
    eve.preventDefault();
    kit.say('', 'prompt');
  }
};

const autoGrow = (textarea) => {
  textarea.style.height = 'auto';

var stream = function(t){
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(t, {state: stream, send: function(c){ kit.say(c, 'host') }});
  stream.live || (stream.live = (function(card, pre){
    card = B.new('div');
    card.className = 'reply-card streaming';
    pre = B.new('pre');
    card.append(pre);
    card.pre = pre;
    card.raw = '';
    shell.append(card);
    return card;
  }()));
  stream.live.raw += t;
  stream.live.pre.textContent = ((window.shellReply || {}).clean ? window.shellReply.clean(stream.live.raw) : stream.live.raw).flat().replace(/\r/g, '');
  stream.last = (window.shellReply || {}).clean ? window.shellReply.clean((stream.last||'')+t) : ((stream.last||'')+t);
  var atBottom = (B.scrollHeight - B.scrollTop - B.clientHeight < 50) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < 50);
  if(atBottom) { B.scrollTop = B.scrollHeight; shell.scrollTop = shell.scrollHeight; }
  (stream.eat || CMD.bash)(stream.last);
}, CMD = {};

;(function(){
var F = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>'];
var P = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>'];
function scrub(s){ return s.flat().replace(/\r/g, '') }
stream.eat = function(s){
  var flat = scrub(s);
  var f = flat.cut(F,ESC);
  if(!f[1]){ setTimeout(t=>{if(F.forEach){shell.append("cannot find prompt. custom shell being used?")}}); return }
  F = f[1];
  f = f[0].split('\n').slice(-1)[0];
  F = f+F;
  (stream.eat = CMD.bash)(s);
}
CMD.bash = function(S, cmdl, cmd, tmp){
  var flat = scrub(S);
  var arr = flat.split(F);
  if(arr[arr.length-1].trim()){
    if(P.some(function(c){ return flat.replace(/\s+$/, '').endsWith(c) })){
      var lines = flat.split('\n'), lastL = lines[lines.length-1];
      var newF = lastL.cut(P, ESC);
      if(newF[1]){
        var nextF = newF[0] + newF[1];
        flat = flat.split(F).join(nextF);
        F = nextF;
        arr = flat.split(F);
      } else return;
    } else return;
  }
  S = arr;
  stream.last = '';
  if(stream.live){
    stream.live.remove();
    stream.live = null;
  }
  var atBottom = (B.scrollHeight - B.scrollTop - B.clientHeight < 50) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < 50);
  S.forEach(function(s,v,t,p){
    if(!(t = s.trim())){ return }
    var lines = t.split('\n');
    var cmdLine = lines[0].trim();
    var output = lines.slice(1).join('\n');

    // Handle clear command
    if(cmdLine === 'clear' || cmdLine === 'cls'){
      shell.innerHTML = '';
      return;
    }

    (v = B.new('div')).className = 'reply-card ready-upgrade';
    v.raw = s;

    if(cmdLine){
      var cmdEl = B.new('div');
      cmdEl.className = 'cmd-line';
      cmdEl.textContent = '$ ' + cmdLine;
      v.append(cmdEl);
    }

    if(output.trim()){
      (p = B.new('pre')).textContent = output;
      v.append(p);
    }

    // Try iframe upgrade for rich command rendering
    setTimeout(function(){
      if(v.upgraded || v.upgrading){ return }
      cmd = cmdLine.replace(/^.*(?:\$|#|>|PS>)\s*/, '');
      cmd = cmd.trim().split(/\s+/)[0].trim();
      if(!cmd){ return }
      var i = B.new('iframe');
      i.src = './cmd/'+cmd+'.html';
      i.setAttribute('scrolling','no');
      v.upgrading = 1;
      v.append(i);
      kit.ear('load', function(eve){
        if(eve.detail === undefined) return;
        if(eve.target !== i) return;
        kit.say(t, cmd, i);
        v.upgraded = 1;
        v.upgrading = 0;
        v.classList.remove('ready-upgrade');
        if(cmdEl) cmdEl.remove();
        v.all('pre').forEach(function(el){ el.remove() });
      }, i);
      setTimeout(function(){
        if(v.upgraded || !v.upgrading){ return }
        v.upgrading = 0;
        i.remove();
      },900);
    },99);
    shell.append(v);
  });
  if(atBottom) { B.scrollTop = B.scrollHeight; shell.scrollTop = shell.scrollHeight; }
}
}());
