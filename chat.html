<script>;(function(chat){ chat();
var prompt;
var shell = B.all('#shell')[0];
var help = B.all('#help')[0];
var scrollBtn = B.all('#scroll')[0];
var mod = {};
(prompt = B.all('#prompt')[0]).focus();

var keyClr = function(){
  mod.ctrl = 0;
  mod.alt = 0;
  mod.shift = 0;
  keyUi();
};

var tuiFocus = function(frame, win){
  frame = frame || stream.tui_frame;
  if(!frame){ return; }
  if(frame.focus){ frame.focus(); }
  win = frame.contentWindow;
  if(win && win.focus){ win.focus(); }
};

var setTuiMode = function(on, card){
  card = card || stream.tui_card;
  B.classList[on ? 'add' : 'remove']('tui-mode');
  if(card){ card.classList[on ? 'add' : 'remove']('tui-live'); }
  if(!on && scrollBtn){ scrollBtn.classList.remove('show'); }
  if(!on){ keyClr(); }
  setTimeout(function(){
    var w = stream.tui_frame && stream.tui_frame.contentWindow;
    if(w){ w.dispatchEvent(new Event('resize')); }
  }, 30);
  setTimeout(function(){
    var w = stream.tui_frame && stream.tui_frame.contentWindow;
    if(w){ w.dispatchEvent(new Event('resize')); }
  }, 180);
};

var finishTuiExit = function(){
  var queue = stream.exitQueue || [];
  stream.exitingTui = 0;
  stream.exitQueue = [];
  stream.exitBuf = '';
  clearTimeout(exitTui.wait);
  clearTimeout(exitTui.confirmWait);
  queue.forEach(function(cmd){
    kit.say(cmd, 'prompt');
  });
};

var deactivateTuiCard = function(card, frame){
  card = card || stream.tui_card;
  frame = frame || stream.tui_frame;
  setTuiMode(0, card);
  if(card){
    card.classList.remove('tui-live');
    card.classList.remove('tui');
    card.classList.add('done');
    if(!card.querySelector('.tui-note')){
      var note = B.new('p');
      note.className = 'tui-note';
      note.textContent = 'session ended';
      card.append(note);
    }
  }
  if(frame){
    frame.dataset.closed = '1';
    frame.style.pointerEvents = 'none';
    frame.setAttribute('tabindex', '-1');
    if(frame.remove){ frame.remove(); }
  }
  if(stream.tui_card === card){ stream.tui_card = null; }
  if(stream.tui_frame === frame){ stream.tui_frame = null; }
  stream.tui_line = '';
};



var low = function(){
  var gap = 50;
  return (B.scrollHeight - B.scrollTop - B.clientHeight < gap) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < gap);
};
window.go = function(){
  B.scrollTop = B.scrollHeight;
  shell.scrollTop = shell.scrollHeight;
};
var tip = function(){
  if(low()){
    go();
    if(scrollBtn){ scrollBtn.classList.remove('show'); }
  }
  else if(scrollBtn) { scrollBtn.classList.add('show'); }
};

kit.ear('style',()=>{ tip(); });

kit.ear('chat',(eve)=>{
  stream(eve.detail || eve.data);
});
kit.ear('host',(eve)=>{
  if(eve.target === window){ return; }
  kit.say(eve.detail || eve.data, 'host');
});
kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  if(cmd){
    prompt.value = cmd;
    autoGrow(prompt);
  }
  var val = prompt.value.trim();
  if(!val){
    prompt.value = '';
    autoGrow(prompt);
    return;
  }
  if(stream.exitingTui){
    (stream.exitQueue = stream.exitQueue || []).push(val);
    prompt.value = '';
    autoGrow(prompt);
    return;
  }
  var word = val.split(/\s+/)[0];
  var isTui = (kit.tui||[]).indexOf(word) >= 0;
  var isKnown = (kit.cmd.known||[]).indexOf(word) >= 0;
  stream.tui = (isTui || !isKnown) ? 1 : 0;
  if(stream.tui){
    var card = B.new('div'); card.className = 'reply-card tui';
    var hp = B.new('p'); hp.textContent = (stream.F||'bash').flat().replace(/[$#>%]\s*$/,'').trim()||'bash'; card.append(hp);
    var hc = B.new('p'); hc.textContent = '$ '+val; card.append(hc);
    shell.append(card);
    stream.tui_card = card;
    stream.tui_frame = null;
    stream.tui_line = '';
    setTuiMode(1, card);
    if(prompt.blur){ prompt.blur(); }
    chainPick = null;
    renderShortcuts();
    stream.tui_buf = [];
    kit.cmd.load(card, 'trm', '', function(){
      var frame = card.querySelector('iframe');
      if(frame){
        stream.tui_frame = frame;
        frame.dataset.closed = '';
        setTimeout(function(){ tuiFocus(frame); }, 60);
      }
      var buf = (stream.tui_buf||[]).join('');
      stream.tui_buf = null;
      if(buf){ kit.say(buf, 'trm'); }
      go();
    });
    if(stream.live){ stream.live.remove(); stream.live = null; }
    stream.last = '';
  }
  kit.say(val+'\r','host');
  prompt.value = "";
  autoGrow(prompt);
  window.buzz();
  go();
});

kit.ear('prompt.try',(eve)=>{
  prompt.value = eve.detail||eve.data;
  autoGrow(prompt);
});

var put = function(txt, a, z, s){
  prompt.focus();
  a = prompt.selectionStart || 0;
  z = prompt.selectionEnd || 0;
  s = prompt.value;
  prompt.value = s.slice(0, a) + txt + s.slice(z);
  a += txt.length;
  prompt.setSelectionRange(a, a);
  autoGrow(prompt);
};

var helpSay = function(txt){
  if(help.wait){ clearTimeout(help.wait); }
  if(help.gone){ clearTimeout(help.gone); }
  help.classList.remove('off');
  help.textContent = txt || '';
  if(!txt){ return; }
  help.wait = setTimeout(function(){
    help.classList.add('off');
  }, 1800);
  help.gone = setTimeout(function(){
    help.textContent = '';
    help.classList.remove('off');
  }, 4300);
};

var ctrl = function(key, code){
  if(!key || key.length !== 1){ return ''; }
  code = key.toUpperCase().charCodeAt(0);
  if(code >= 65 && code <= 90){ return String.fromCharCode(code - 64); }
  if(code >= 91 && code <= 95){ return String.fromCharCode(code - 64); }
  if(code === 54){ return String.fromCharCode(30); }
  if(code === 191){ return String.fromCharCode(31); }
  return '';
};

var keyUi = function(){
  ['ctrl','alt','shift'].forEach(function(name){
    var on = shortcutsEl && shortcutsEl.querySelector('[data-mod="'+name+'"]');
    if(on){ on.classList[mod[name] ? 'add' : 'remove']('live'); }
  });
};

var tapTui = function(name, out){
  if(name === 'exit'){ exitTui(); return; }
  if(name === 'ctrl' || name === 'alt' || name === 'shift'){
    mod[name] = !mod[name];
    keyUi();
    return;
  }
  if(name === 'mode'){ out = '\u001b[Z'; }
  if(name === 'esc'){ out = '\u001b'; }
  if(name === 'tab'){ out = mod.shift ? '\u001b[Z' : '\t'; }
  if(name === 'up'){ out = '\u001b[A'; }
  if(name === 'down'){ out = '\u001b[B'; }
  if(name === 'left'){ out = '\u001b[D'; }
  if(name === 'right'){ out = '\u001b[C'; }
  if(name === 'enter'){
    out = '\r';
    stream.tui_line = '';
  }
  if(name === 'bs'){
    out = '\x7f';
    stream.tui_line = (stream.tui_line||'').slice(0, -1);
  }
  if(name === 'cc'){
    out = '\x03';
    stream.tui_line = '';
  }
  if(name === 'cd'){
    out = '\x04';
    stream.tui_line = '';
  }
  if(name === 'slash'){
    out = mod.ctrl ? String.fromCharCode(31) : '/';
    if(mod.ctrl){ stream.tui_line = ''; }
    else { stream.tui_line = (stream.tui_line || '') + '/'; }
  }
  if(name === 'space'){
    out = ' ';
    stream.tui_line = (stream.tui_line || '') + ' ';
  }
  if(!out){ return; }
  kit.say(out,'host');
  keyClr();
  tuiFocus();
};

var tapKey = function(name){
  if(stream.tui){
    tapTui(name);
    return;
  }
  if(name === 'esc'){ put('\u001b'); return; }
  if(name === 'tab'){ put('\t'); return; }
  if(name === 'alt'){ put('\u001b'); return; }
  if(name === 'cmd'){ put('\u001b'); return; }
  if(name === 'ctrl'){
    mod.ctrl = !mod.ctrl;
    keyUi();
  }
};

var tuiDown = function(eve, tkey){
  if(!stream.tui){ return; }
  if(eve.key === 'Enter'){
    if((stream.tui_line||'').trim() === 'exit'){
      eve.preventDefault();
      exitTui();
      return 1;
    }
    tkey = '\r';
    stream.tui_line = '';
  }
  else if(eve.key === 'Escape'){ tkey = '\u001b'; }
  else if(eve.key === 'ArrowUp'){ tkey = '\u001b[A'; }
  else if(eve.key === 'ArrowDown'){ tkey = '\u001b[B'; }
  else if(eve.key === 'ArrowLeft'){ tkey = '\u001b[D'; }
  else if(eve.key === 'ArrowRight'){ tkey = '\u001b[C'; }
  else if(eve.key === 'Tab'){ tkey = eve.shiftKey ? '\u001b[Z' : '\t'; }
  else if(eve.key === 'Backspace'){
    tkey = '\x7f';
    stream.tui_line = (stream.tui_line||'').slice(0, -1);
  }
  else if(eve.ctrlKey && eve.key === 'c'){ eve.preventDefault(); exitTui(); return 1; }
  else if(eve.ctrlKey && eve.key.length === 1){
    tkey = ctrl(eve.key);
    stream.tui_line = '';
  }
  else if(eve.key.length === 1){
    tkey = eve.key;
    stream.tui_line = (stream.tui_line || '') + eve.key;
  }
  if(!tkey){ return; }
  eve.preventDefault();
  kit.say(tkey, 'host');
  prompt.value = '';
  autoGrow(prompt);
  return 1;
};

var history = [], hi=1;
prompt.onkeydown = function(eve){
  var ch;
  if(mod.ctrl && eve.key && eve.key.length === 1 && !eve.altKey && !eve.metaKey){
    ch = ctrl(eve.key);
    if(ch){
      eve.preventDefault();
      put(ch);
      mod.ctrl = 0;
      keyUi();
      return;
    }
  }
  if(stream.tui){
    tuiDown(eve);
    return;
  }
  if (eve.key === 'Enter' && !eve.shiftKey) {
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
  if(eve.key === 'ArrowUp') {
    if(hi > 0) { hi--; prompt.value = history[hi]; autoGrow(prompt); }
    eve.preventDefault();
  } else if (eve.key === 'ArrowDown') {
    if(hi < history.length - 1) { hi++; prompt.value = history[hi]; }
    else { hi = history.length; prompt.value = ''; }
    autoGrow(prompt);
    eve.preventDefault();
  }
};
            
kit.ear('key', function(eve){ tapKey(eve.detail||eve.data); });
window.addEventListener('keydown', function(eve){
  if(!stream.tui){ return; }
  if(eve.target === prompt){ return; }
  if((eve.target.closest||function(){}).call(eve.target, '#shortcuts')){ return; }
  tuiDown(eve);
}, true);
// TUI: outside the belt, clicks should return focus to the terminal frame.
window.addEventListener('pointerdown', function(eve) {
  if(!stream.tui) return;
  if((eve.target.closest||function(){}).call(eve.target, '#shortcuts')){ return; }
  tuiFocus();
}, true);
                         
prompt.oninput = function(eve){
  if(stream.tui){
    prompt.value = '';
    autoGrow(prompt);
    return;
  }
  autoGrow(prompt);
  if(prompt.wait){ clearTimeout(prompt.wait) }
  prompt.wait = setTimeout(async function(){
    var answer = await AI.shell("1 sentence reply for terminal shell or code help:" + prompt.value);
    var doc = new DOMParser().parseFromString(answer, 'text/html');
    var v = doc.querySelector('.a') || doc.body;
    helpSay(v.textContent || '');
    prompt.try = ((v.querySelector('code') || v.querySelector('b')) || {}).textContent||'';
    tip();
  },333);
}
const autoGrow = (textarea) => {
  textarea.style.height = 'auto';
  textarea.style.height = (textarea.scrollHeight) + 'px';
  // Fix for mobile browser URL bar hiding the prompt
  setTimeout(() => {
    window.scrollTo(0, document.body.scrollHeight);
  }, 100);
};

prompt.onfocus = function(eve){
  autoGrow(prompt);
};

autoGrow(prompt);

window.addEventListener('scroll', function() {
  if(low() && scrollBtn){ scrollBtn.classList.remove('show'); }
}, true);
if(scrollBtn){
  scrollBtn.onclick = function(){
    go();
    scrollBtn.classList.remove('show');
  };
}

B.all('#help')[0].ear('pointerdown',function(eve){
  if(!prompt.try){ return }
  eve.preventDefault();
  kit.say(prompt.try, 'prompt.try');
});
var stream = function(t){
  if(stream.tui){
    if(Array.isArray(stream.tui_buf)){
      stream.tui_buf.push(t);
    } else {
      kit.say(t, 'trm');
    }
    tip();
    return;
  }
  if(stream.exitingTui){
    stream.exitBuf = ((stream.exitBuf || '') + (t||'').flat()).slice(-400);
    if(/Enter\s+to confirm\s+\u00b7\s+Esc\s+to cancel|Enter\s+to confirm/.test(stream.exitBuf)){
      clearTimeout(exitTui.confirmWait);
      exitTui.confirmWait = setTimeout(function(){ kit.say('\r','host'); }, 40);
    }
    if(/(?:^|\r?\n)[^\r\n]*[$#>%]\s*$/.test(stream.exitBuf)){
      finishTuiExit();
    }
  }
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(t, {state: stream, send: function(c){ kit.say(c, 'host') }});
  stream.live || (stream.live = (function(card, pre){
    card = B.new('div');
    card.className = 'reply-card streaming';
    pre = B.new('pre');
    card.append(pre);
    card.pre = pre;
    card.raw = '';
    shell.append(card);
    return card;
  }()));
