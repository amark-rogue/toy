<script>;(function(chat){ chat();
var prompt;
var shell = B.all('#shell')[0];
var help = B.all('#help')[0];
var scrollBtn = B.all('#scroll')[0];
var belt = B.all('.kit .tin')[0];
// --- agent mode (claude / codex) ---
var agent = {mode:'', iframe:null, sid:null, kind:''};
var shellCwd = '';

var agentEnter = function(iframe, kind){
  agent.iframe = iframe;
  agent.mode = kind;
  agent.kind = kind;
  help.style.opacity = '1';
  prompt.placeholder = kind + '>';
};
var agentExit = function(){
  agent.mode = '';
  agent.iframe = null;
  help.textContent = '';
  help.style.opacity = '';
  prompt.placeholder = '$';
};

kit.ear('claude-session', function(eve){ if(agent.kind==='claude') agent.sid = eve.detail||eve.data||null; });
kit.ear('codex-session', function(eve){ if(agent.kind==='codex') agent.sid = eve.detail||eve.data||null; });

// cwd is tracked by watching pwd output and cd commands in CMD.bash

var card = function(val, kind){
  var v = B.new('div'), p = B.new('pre'), i = B.new('iframe');
  v.className = 'reply-card '+kind+'-card';
  p.textContent = '$ '+val;
  v.append(p);
  i.src = './cmd/'+kind+'.html';
  shell.append(v);
  kit.ear('load', function(eve){
    if(eve.detail === undefined) return;
    if(eve.target !== i) return;
    var msg = {prompt:val, cwd:shellCwd};
    if(kind === 'claude') msg.session = agent.sid;
    if(kind === 'codex') msg.thread = agent.sid;
    kit.say(msg, kind, i);
    agentEnter(i, kind);
  }, i);
  v.append(i);
  p.style.cursor = 'pointer';
  p.onclick = function(){
    if(agent.mode && agent.iframe === i) return;
    agentEnter(i, kind);
    go();
  };
  go();
};
var mod = {};
(prompt = B.all('#prompt')[0]).focus();

var low = function(){
  var gap = 50;
  return (B.scrollHeight - B.scrollTop - B.clientHeight < gap) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < gap);
};
window.go = function(){
  B.scrollTop = B.scrollHeight;
  shell.scrollTop = shell.scrollHeight;
};
var tip = function(){
  if(low()){
    go();
    if(scrollBtn){ scrollBtn.classList.remove('show'); }
  }
  else if(scrollBtn) { scrollBtn.classList.add('show'); }
};

kit.ear('style',()=>{ tip(); });

kit.ear('host',(eve)=>{
  if(eve.target === window){ return }
  kit.up(eve.detail || eve.data, 'host');
});

kit.ear('chat',(eve)=>{
  var d = eve.detail || eve.data;
  try{
    var j = ('string' == typeof d) ? JSON.parse(d) : d;
    if(j.type && agent.iframe){
      if(j.type.indexOf('claude') === 0){ kit.say(j, 'claude', agent.iframe); return }
      if(j.type.indexOf('codex') === 0){ kit.say(j, 'codex', agent.iframe); return }
    }
  }catch(e){}
  stream(d);
});
kit.ear('prompt',(eve)=>{
  var cmd = eve.detail||eve.data;
  if(cmd){
    prompt.value = cmd;
    autoGrow(prompt);
  }
  var val = prompt.value.trim();
  if(!val){
    prompt.value = '';
    autoGrow(prompt);
    return;
  }

  // exit agent mode
  if(agent.mode && /^exit$/i.test(val)){
    agentExit();
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    return;
  }

  // in agent mode, send follow-up
  if(agent.mode && agent.iframe && val){
    var msg = {prompt:val, cwd:shellCwd};
    if(agent.kind === 'claude') msg.session = agent.sid;
    if(agent.kind === 'codex') msg.thread = agent.sid;
    kit.say(msg, agent.kind, agent.iframe);
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    go();
    return;
  }

  // start new claude session
  if(/^claude(\s|$)/.test(val)){
    card(val, 'claude');
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    return;
  }

  // start new codex session
  if(/^codex(\s|$)/.test(val)){
    card(val, 'codex');
    prompt.value = "";
    autoGrow(prompt);
    window.buzz();
    return;
  }

  kit.say(prompt.value+'\r','host');
  prompt.value = "";
  autoGrow(prompt);
  window.buzz();
  go();
});

kit.ear('prompt.try',(eve)=>{
  prompt.value = eve.detail||eve.data;
  autoGrow(prompt);
});

var put = function(txt, a, z, s){
  prompt.focus();
  a = prompt.selectionStart || 0;
  z = prompt.selectionEnd || 0;
  s = prompt.value;
  prompt.value = s.slice(0, a) + txt + s.slice(z);
  a += txt.length;
  prompt.setSelectionRange(a, a);
  autoGrow(prompt);
};

var helpSay = function(txt){
  if(help.wait){ clearTimeout(help.wait); }
  if(help.gone){ clearTimeout(help.gone); }
  help.classList.remove('off');
  help.textContent = txt || '';
  if(!txt){ return; }
  help.wait = setTimeout(function(){
    help.classList.add('off');
  }, 1800);
  help.gone = setTimeout(function(){
    help.textContent = '';
    help.classList.remove('off');
  }, 4300);
};

var ctrl = function(key, code){
  if(!key || key.length !== 1){ return ''; }
  code = key.toUpperCase().charCodeAt(0);
  if(code >= 65 && code <= 90){ return String.fromCharCode(code - 64); }
  if(code >= 91 && code <= 95){ return String.fromCharCode(code - 64); }
  if(code === 54){ return String.fromCharCode(30); }
  if(code === 191){ return String.fromCharCode(31); }
  return '';
};

var keyUi = function(){
  var on = B.all('#ctrl')[0];
  if(on){ on.classList[mod.ctrl ? 'add' : 'remove']('live'); }
};

var tapKey = function(name){
  if(name === 'esc'){ put('\u001b'); return; }
  if(name === 'tab'){ put('\t'); return; }
  if(name === 'alt'){ put('\u001b'); return; }
  if(name === 'cmd'){ put('\u001b'); return; }
  if(name === 'ctrl'){
    mod.ctrl = !mod.ctrl;
    keyUi();
  }
};

var history = [], hi=1;
prompt.onkeydown = function(eve){
  var ch;
  if(mod.ctrl && eve.key && eve.key.length === 1 && !eve.altKey && !eve.metaKey){
    ch = ctrl(eve.key);
    if(ch){
      eve.preventDefault();
      put(ch);
      mod.ctrl = 0;
      keyUi();
      return;
    }
  }
  if (eve.key === 'Enter' && !eve.shiftKey) {
    eve.preventDefault();
    kit.say('', 'prompt');
    return;
  }
  if(eve.key === 'ArrowUp') {
    if(hi > 0) { hi--; prompt.value = history[hi]; autoGrow(prompt); }
    eve.preventDefault();
  } else if (eve.key === 'ArrowDown') {
    if(hi < history.length - 1) { hi++; prompt.value = history[hi]; }
    else { hi = history.length; prompt.value = ''; }
    autoGrow(prompt);
    eve.preventDefault();
  }
};
            
kit.ear('belt', function(eve, data, b){
  data = eve.detail || eve.data;
  var name = data.name||data[0];
  if(B.all('#'+name)[0]){return}
  b = B.new('button');

  b.id = b.textContent = name;

  b.onclick = function(){
    if(data.key){ tapKey(name); return; }
    kit.say(data.prompt||data[1], 'prompt');
  };
  belt.append(b);
});
kit.ear('pointerdown',(eve)=>{
   belt.tag('open',1);
}, belt);
window.addEventListener('pointerup',(eve)=>{
   belt.tag('open',-1);
});
window.addEventListener('touchend',(eve)=>{
   belt.tag('open',-1);
});
setTimeout(()=>{
[
  {name: 'esc', key: 1},
  {name: 'ctrl', key: 1},
  {name: 'tab', key: 1},
  {name: 'alt', key: 1},
  {name: 'cmd', key: 1}
].forEach(function(v){
  kit.say(v, 'belt');
});
kit.say(['claude','claude '], 'belt');
kit.say(['codex','codex '], 'belt');
kit.say(['exit','exit'], 'belt');
},999);
                         
prompt.oninput = function(eve){
  autoGrow(prompt);
  //console.log("oninput?", prompt.value, eve);
  if(prompt.wait){ clearTimeout(prompt.wait) }
  prompt.wait = setTimeout(async function(){
    try{
      var answer = await AI.shell("1 sentence reply for terminal shell or code help:" + prompt.value);
      var doc = new DOMParser().parseFromString(answer, 'text/html');
      var v = doc.querySelector('.a') || doc.body;
      helpSay(v.textContent || '');
      prompt.try = ((v.querySelector('code') || v.querySelector('b')) || {}).textContent||'';
      tip();
    }catch(e){}
  },333);
}
const autoGrow = (textarea) => {
  textarea.style.height = 'auto';
  textarea.style.height = (textarea.scrollHeight) + 'px';
  // Fix for mobile browser URL bar hiding the prompt
  setTimeout(() => {
    window.scrollTo(0, document.body.scrollHeight);
  }, 100);
};

prompt.onfocus = function(eve){
  autoGrow(prompt);
};

autoGrow(prompt);

window.addEventListener('scroll', function() {
  if(low() && scrollBtn) {
    scrollBtn.classList.remove('show');
  }
}, true);
scrollBtn.onclick = function(){ go(); scrollBtn.classList.remove('show'); };

B.all('#help')[0].ear('pointerdown',function(eve){
  if(!prompt.try){ return }
  eve.preventDefault();
  kit.say(prompt.try, 'prompt.try');
});
var stream = function(t){
  (window.shellReply || {}).maybeContinue && window.shellReply.maybeContinue(t, {state: stream, send: function(c){ kit.say(c, 'host') }});
  stream.live || (stream.live = (function(card, pre){
    card = B.new('div');
    card.className = 'reply-card streaming';
    pre = B.new('pre');
    card.append(pre);
    card.pre = pre;
    card.raw = '';
    shell.append(card);
    return card;
  }()));
  var isRefresh = t.includes('\x1b[H') || t.includes('\x1b[2J') || t.includes('\x1b[J');
  if(isRefresh){
    stream.live.raw = t;
  } else {
    stream.live.raw += t;
  }
  var cleaned = (window.shellReply || {}).clean ? window.shellReply.clean(stream.live.raw) : stream.live.raw;
  stream.live.pre.textContent = cleaned.flat();
  stream.last = (window.shellReply || {}).clean ? window.shellReply.clean((isRefresh ? '' : (stream.last||''))+t) : ((isRefresh ? '' : (stream.last||''))+t);
  tip();
  (stream.eat || CMD.bash)(stream.last);
}, CMD = {};

;(function(){
var F = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>','%','~%'];
stream.eat = function(s){
  var f = s.cut(F,ESC);
  if(!f[1]){ setTimeout(t=>{if(F.forEach){shell.append("cannot find prompt. custom shell being used?")}}); return }
  F = f[1];
  f = f[0].split('\r\n').slice(-1)[0]; // make more unique?
  F = f+F;
  //console.log("prompt:", [F]);
  (stream.eat = CMD.bash)(s);
}
CMD.bash = function(S, cmdl, cmd, tmp){
  var arr = S.split(F);
  var usedF = F;

  if(arr[arr.length-1].flat().trim()){ 
    var P = ['$','#','>','C:\\>','PS>','>>>','...','(venv)','>>','%','~%'];
    if(P.some(c => S.flat().replace(/\s+$/, '').endsWith(c))){
      var lines = S.split('\n'), lastL = lines[lines.length-1];
      var newF = lastL.cut(P, ESC);
      if(newF[1]){
        var nextF = newF[0].split('\r').slice(-1)[0] + newF[1];
        S = S.split(F).join(nextF);
        F = nextF;
        arr = S.split(F);
      } else return;
    } else return;
  }
  S = arr;
  stream.last = '';
  if(stream.live){
    stream.live.remove();
    stream.live = null;
  }
  var atBottom = (B.scrollHeight - B.scrollTop - B.clientHeight < 50) && (shell.scrollHeight - shell.scrollTop - shell.clientHeight < 50);
  var oldF = usedF;
  var firstChunk = true;
  S.forEach(function(s,i){
    var v,t,p;
    if(!(t = s.flat()).trim()){ return }
    // track cwd from pwd output and cd commands
    var lines = t.split(/[\r\n]+/);
    var cmdLine = lines[0].replace(/^.*(?:\$|#|>|PS>)\s*/,'').trim();
    if(/^pwd\b/.test(cmdLine)){
      // pwd output is the last non-empty line before prompt
      for(var li = lines.length-1; li >= 1; li--){
        var ln = lines[li].trim();
        if(ln && ln.charAt(0) === '/'){ shellCwd = ln; break; }
      }
    }
    if(/^cd\b/.test(cmdLine)){
      // after cd, look for a path in output or resolve relative to current
      var cdArg = cmdLine.replace(/^cd\s+/,'').replace(/['"]/g,'').trim();
      if(cdArg === '~' || cdArg === '') shellCwd = '';
      else if(cdArg === '..') shellCwd = shellCwd.replace(/\/[^\/]*$/,'') || '/';
      else if(cdArg.charAt(0) === '/') shellCwd = cdArg;
      else if(shellCwd) shellCwd = shellCwd + '/' + cdArg;
    }
    (p = B.new('pre')).textContent = t;
    (v = B.new('div')).className = 'reply-card ready-upgrade';
    v.raw = s;
    v.append(p);
    setTimeout(function(eve){
      if(v.upgraded || v.upgrading){ return }
      var cmd = t.cut(['\r\n','\n','\r'],ESC)[0].trim();
      cmd = cmd.replace(/^.*(?:\$|#|>|PS>)\s*/, '');
      var p = B.new('p');

      var promptToUse = firstChunk ? oldF : F;
      firstChunk = false;
      var promptText = (Array.isArray(promptToUse) ? '$' : (promptToUse.flat ? promptToUse.flat() : promptToUse)).trim();
      var match = promptText.match(/^(.*?)([\$#>\%]\s*|\~%\s*)$/s);
      if (match) {
         var pathPart = match[1].trim();
         var symPart = match[2].trim();
         var colonIdx = pathPart.lastIndexOf(':');
         var pathOnly = colonIdx !== -1 ? pathPart.substring(colonIdx + 1) : pathPart;
         var prefix = colonIdx !== -1 ? pathPart.substring(0, colonIdx + 1) : "";
         var parts = pathOnly.split('/');
         if (parts.length > 4) {
           pathOnly = parts.slice(0, 2).join('/') + '/.../' + parts.slice(-2).join('/');
         }
         promptText = prefix + pathOnly ;
      }
      
      
      p.innerText = promptText;
      v.append(p);
      p = B.new('p');
      p.innerText = symPart+' '+cmd;
      v.append(p);
      cmd = cmd.trim().split(/\s+/)[0].trim();
      if(!cmd){ return }
      //if(cmd === 'clear'){ kit.say(s, 'clear'); return; }
      var i = B.new('iframe');
      i.src = './cmd/'+cmd+'.html';
      i.setAttribute('scrolling','no');
      v.upgrading = 1;
      v.append(i);
      kit.ear('load', function(eve){
        if(eve.detail === undefined) return; // Ignore native iframe load (e.g. 404)
        if(eve.target !== i) return;
        kit.say(s,cmd, i);
        v.upgraded = 1;
        v.upgrading = 0;
        v.classList.remove('ready-upgrade');
        v.all('pre')[0].remove();
      }, i);
      setTimeout(function(){
        if(v.upgraded || !v.upgrading){ return }
        v.upgrading = 0;
        i.remove();
      },900);
    },99);
    shell.append(v);
  });
  tip();
}
}());
